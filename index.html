<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboards</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #18212b;
      --muted: #687585;
      --line: #dfe6ee;
      --accent: #1769e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    main {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 28px 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
    }
    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    a.card {
      display: block;
      min-height: 132px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
    }
    .name {
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .open {
      margin-top: 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 650;
    }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <main>
    <h1>Dashboards</h1>
    <p class="sub">个人看板入口。每个看板独立保存页面、最新数据和历史快照。</p>
    <section class="grid">
      <a class="card" href="./dashboards/index-decision/">
        <div class="name">投资观察看板</div>
        <div class="desc">核心指数、观察池、提醒和数据缺口。默认读取最新快照。</div>
        <div class="open">打开看板</div>
      </a>
      <a class="card" href="./dashboards/short-flow/">
        <div class="name">short-flow A股短线资金跟随</div>
        <div class="desc">市场/板块资金流、观察池信号、触发条件和失败条件。</div>
        <div class="open">打开看板</div>
      </a>
    </section>
  </main>
</body>
</html>
