<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboards</title>
  <link rel="stylesheet" href="./dashboards/shared/tokens.css">
  <style>
    main {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 28px 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    a.card {
      min-height: 132px;
      color: inherit;
      text-decoration: none;
    }
    .card .name {
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .open {
      margin-top: auto;
      padding-top: 14px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <h1>Dashboards</h1>
    <p class="sub">只保留两类决策：长期资产配置与独立的 A 股资金观察。</p>
    <section class="grid">
      <a class="card" href="./dashboards/index-decision/">
        <div class="name">投资观察看板</div>
        <div class="desc">围绕 VOO/VT、纳指100、标普500和红利低波的低维护配置观察。</div>
        <div class="open">打开看板</div>
      </a>
      <a class="card" href="./dashboards/short-flow/">
        <div class="name">A股资金观察</div>
        <div class="desc">独立观察市场与板块资金，不并入长期配置，不提供交易入口。</div>
        <div class="open">打开看板</div>
      </a>
    </section>
  </main>
</body>
</html>
