<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>投资观察看板</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    main.wrap { padding-bottom: calc(78px + env(safe-area-inset-bottom)); }
    section {
      scroll-margin-top: 188px;
      margin: 18px 0 22px;
    }
    /* 概览：只保留会改变配置动作的状态卡 */
    .pulse-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .pulse {
      min-height: 92px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--muted);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pulse.ok { border-left-color: var(--green); }
    .pulse.warn { border-left-color: var(--amber); }
    .pulse.info { border-left-color: var(--blue); }
    .pulse .k {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 680;
    }
    .pulse .k .tag {
      margin-left: auto;
      font-size: 11px;
      font-weight: 680;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
    }
    .pulse.ok .k .tag { background: var(--green-soft); color: var(--green); }
    .pulse.warn .k .tag { background: var(--amber-soft); color: var(--amber); }
    .pulse.info .k .tag { background: var(--blue-soft); color: var(--blue); }
    .pulse .v {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .card-list {
      display: grid;
      gap: 10px;
    }
    .card { min-height: 216px; }
    .alert-card {
      min-height: 150px;
    }
    .data-notice {
      min-height: 118px;
      border-left: 3px solid var(--amber);
      background: #fffaf0;
    }
    .signal { border-left: 3px solid #9db8e8; border-radius: 6px; }

    .gap-box div + div { margin-top: 4px; }

    @media (min-width: 640px) {
      .pulse-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 820px) {
      .wrap { padding-left: 20px; padding-right: 20px; }
      .hero { grid-template-columns: minmax(0, 1fr) 360px; align-items: start; }
      .summary { grid-column: 2; grid-row: 1 / span 2; }
      .toolbar { grid-template-columns: minmax(260px, 1fr) auto; }
      .card-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bottom-nav { display: none; }
      main.wrap { padding-bottom: 28px; }
    }
    @media (min-width: 1180px) {
      .card-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 370px) {
      h1 { font-size: 19px; }
      .summary { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .price { font-size: 18px; }
    }
  </style>
  <script src="../shared/api-client.js"></script>
  <script src="../shared/format.js"></script>
</head>
<body>
  <header>
    <div class="wrap hero">
      <div>
        <h1>投资观察看板</h1>
        <div id="meta" class="meta">等待数据</div>
        <nav class="switcher" aria-label="看板切换">
          <a class="current" href="./" aria-current="page">投资观察</a>
          <a href="../short-flow/">A股资金</a>
          <a href="../../">全部</a>
        </nav>
      </div>
      <div class="summary" aria-label="摘要">
        <div class="summary-card"><b id="indexCount">-</b><span>核心指数</span></div>
        <div class="summary-card"><b id="watchCount">-</b><span>观察标的</span></div>
        <div class="summary-card"><b id="alertCount">-</b><span>重点提醒</span></div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜 VOO、QQQ、龙头或分组">
        <button id="reload" type="button">刷新</button>
      </div>
      <nav id="modeChips" class="chips" aria-label="快速筛选"></nav>
      <nav id="groupChips" class="chips" aria-label="分组筛选"></nav>
    </div>
  </header>

  <main class="wrap">
    <section id="overview-section">
      <div class="section-head">
        <h2>配置纪律</h2>
        <span class="hint">先判断是否需要行动</span>
      </div>
      <div id="overview" class="pulse-grid"></div>
    </section>

    <section id="alerts-section">
      <div class="section-head">
        <h2>重点提醒</h2>
        <button id="notify" class="btn-sm" type="button">开启通知</button>
      </div>
      <div id="alerts" class="card-list"></div>
    </section>

    <section id="watchlist-section">
      <div class="section-head">
        <h2>观察池</h2>
        <span id="watchHint" class="hint">筛选后 - 个</span>
      </div>
      <div id="watchlist" class="card-list"></div>
    </section>

    <section id="indices-section">
      <div class="section-head">
        <h2>核心指数</h2>
        <span class="hint">仓位节奏依据</span>
      </div>
      <div id="indices" class="card-list"></div>
    </section>

    <section id="gaps-section">
      <div class="section-head">
        <h2>数据缺口</h2>
        <span class="hint">不假装完整</span>
      </div>
      <div id="gaps" class="empty">暂无数据</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="页面导航">
    <a href="#overview-section" class="active">概览</a>
    <a href="#alerts-section">提醒</a>
    <a href="#watchlist-section">观察</a>
    <a href="#indices-section">指数</a>
    <a href="#gaps-section">缺口</a>
  </nav>

  <script>
    const state = { data: null, mode: [], group: "" };
    const ACTIONABLE_TICKERS = new Set(["VOO", "VT", "QQQ", "512890", "512890.SH"]);
    const { safe, fmt, pct, cls, alertLevelLabel } = DashFmt;
    const isDataIssue = row => {
      const message = row?.message || "";
      return row?.level === "data" || /Yahoo|Stooq|HTTP Error|Too Many Requests|Invalid isoformat|CNBC|WSJ|CSI|Danjuan/i.test(message);
    };
    const isActionAlert = row => !isDataIssue(row);
    const dataIssueMessage = count => count > 1
      ? `${count} 个标的行情暂未更新，先不要据此做买卖判断。`
      : "行情数据暂未更新，先不要据此做买卖判断。";
    const sigma = value => value === null || value === undefined || Number.isNaN(Number(value)) ? "暂无" : `${Number(value).toFixed(2)}σ`;
    const costCls = row => row.cost_buy_signal ? "pos" : row.cost_condition_extreme ? "neg" : "flat";
    const rowTicker = row => String(row?.ticker || row?.code || "").trim().toUpperCase();
    const isActionableTicker = row => ACTIONABLE_TICKERS.has(rowTicker(row));

    async function loadData() {
      state.data = await DashboardApi.fetchLatest("index-decision", "dashboard_latest.json");
      render();
    }

    function watchRows() {
      return state.data?.watchlist || [];
    }

    function assetCard(row, options = {}) {
      const isIndex = options.type === "index";
      const codeLine = isIndex ? `${row.code} · ${row.product || "-"}` : `${row.ticker} · ${row.market}`;
      const title = row.name || row.ticker || row.code;
      const group = row.group || row.kind || "指数";
      const peLine = isIndex ? `${fmt(row.pe_ttm)} / ${pct(row.dividend_yield, 2)}` : `${pct(row.return_1m)} / ${pct(row.return_3m)}`;
      const peLabel = isIndex ? "PE/股息" : "1月/3月";
      const costMetric = !isIndex ? `<div class="metric"><span>成本Z</span><b class="${costCls(row)}">${sigma(row.cost_dev_factor)}</b></div>` : "";
      return `
        <article class="card">
          <div class="top">
            <div>
              <div class="name">${safe(title)}</div>
              <div class="code">${safe(codeLine)}</div>
            </div>
            <div>
              <div class="price">${fmt(row.current)}</div>
              <div style="text-align:right;margin-top:6px"><span class="pill">${safe(group)}</span></div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>较前日</span><b class="${cls(row.change_1d_pct)}">${pct(row.change_1d_pct)}</b></div>
            <div class="metric"><span>距高点</span><b class="${cls(row.drawdown_52w)}">${pct(row.drawdown_52w)}</b></div>
            <div class="metric"><span>${peLabel}</span><b>${peLine}</b></div>
            ${costMetric}
          </div>
          <div class="signal">${safe(row.signal || "正常观察")}</div>
          ${row.reason ? `<div class="reason">${safe(row.reason)}</div>` : ""}
        </article>
      `;
    }

    function renderSummary() {
      document.getElementById("indexCount").textContent = state.data?.indices?.length ?? 0;
      document.getElementById("watchCount").textContent = watchRows().length;
      document.getElementById("alertCount").textContent = alertRows().filter(isActionAlert).length;
      const rel = DashFmt.relativeTime(state.data?.asof);
      const badge = rel.text ? ` <span class="freshness ${rel.level === "fresh" ? "" : safe(rel.level)}">${safe(rel.text)}</span>` : "";
      document.getElementById("meta").innerHTML = `生成时间：${safe(state.data?.asof || "暂无")}${badge} · 只做观察，不执行交易`;
    }

    function alertRows() {
      const backendAlerts = (state.data?.alerts || []).filter(row => isActionAlert(row) && isActionableTicker(row));
      return backendAlerts;
    }

    function dataIssueRows() {
      return [
        ...(state.data?.data_alerts || []),
        ...(state.data?.alerts || []).filter(isDataIssue)
      ];
    }

    function notificationRows() {
      const backendRows = (state.data?.notifications || []).filter(row => isActionAlert(row) && isActionableTicker(row));
      return [...backendRows];
    }

    function renderModeChips() {
      const modes = [
        ["all", "全部"],
        ["alert", "有提醒"],
        ["cost", "成本信号"],
        ["core", "核心"],
        ["US", "美股"],
        ["CN", "A股"]
      ];
      const chips = document.getElementById("modeChips");
      const allActive = state.mode.length === 0;
      chips.innerHTML = modes.map(([mode, label]) =>
        `<button class="chip ${mode === "all" ? (allActive ? "active" : "") : (state.mode.includes(mode) ? "active" : "")}" data-mode="${mode}">${label}</button>`
      ).join("");
      chips.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const mode = button.dataset.mode || "all";
          if (mode === "all") state.mode = [];
          else if (state.mode.includes(mode)) state.mode = state.mode.filter(m => m !== mode);
          else state.mode = [...state.mode, mode];
          renderModeChips();
          renderWatchlist();
        });
      });
    }

    function renderGroupChips() {
      const groups = [...new Set(watchRows().map(row => row.group).filter(Boolean))].sort();
      const chips = document.getElementById("groupChips");
      const allActive = state.group === "";
      chips.innerHTML = `<button class="chip ${allActive ? "active" : ""}" data-group="">全部</button>` +
        groups.map(group => `<button class="chip ${state.group === group ? "active" : ""}" data-group="${safe(group)}">${safe(group)}</button>`).join("");
      chips.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.group = button.dataset.group || "";
          renderGroupChips();
          renderWatchlist();
        });
      });
    }

    function renderIndices() {
      document.getElementById("indices").innerHTML = (state.data?.indices || [])
        .map(row => assetCard(row, { type: "index" }))
        .join("");
    }

    function filteredWatchlist() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      const markets = state.mode.filter(m => m === "US" || m === "CN");
      const needAlert = state.mode.includes("alert");
      const needCost = state.mode.includes("cost");
      const needCore = state.mode.includes("core");
      return watchRows().filter(row => {
        const text = `${row.ticker} ${row.name} ${row.group} ${row.market}`.toLowerCase();
        const marketOk = !markets.length || markets.includes(row.market);
        const alertOk = !needAlert || (isActionableTicker(row) && (row.alerts || []).some(isActionAlert));
        const costOk = !needCost || row.cost_buy_signal;
        const coreOk = !needCore || row.priority === "core";
        return marketOk && alertOk && costOk && coreOk && (!query || text.includes(query)) && (!state.group || row.group === state.group);
      });
    }

    function renderWatchlist() {
      const rows = filteredWatchlist();
      document.getElementById("watchHint").textContent = `筛选后 ${rows.length} 个`;
      document.getElementById("watchlist").innerHTML = rows.length
        ? rows.map(row => assetCard(row)).join("")
        : '<div class="empty">没有匹配的观察标的</div>';
    }

    function renderGaps() {
      const gaps = state.data?.data_gaps || [];
      const box = document.getElementById("gaps");
      const summarized = summarizeGaps(gaps);
      box.className = gaps.length ? "gap-box" : "empty";
      box.innerHTML = gaps.length ? summarized.map(gap => `<div>· ${safe(gap)}</div>`).join("") : "暂无数据缺口";
    }

    function summarizeGaps(gaps) {
      const watchlist = gaps.filter(gap => String(gap).includes("/watchlist")).length;
      const history = gaps.filter(gap => String(gap).includes("/history")).length;
      const valuation = gaps.filter(gap => String(gap).includes("/valuation")).length;
      const cnbc = gaps.filter(gap => String(gap).includes("CNBC")).length;
      const used = watchlist + history + valuation + cnbc;
      const other = Math.max(0, gaps.length - used);
      const rows = [];
      if (watchlist) rows.push(`观察池行情暂未更新：${watchlist} 个标的，可能是行情源限流或暂不可用`);
      if (history) rows.push(`核心指数历史行情暂缺：${history} 项，相关回撤信号需等待下次刷新`);
      if (valuation) rows.push(`估值数据暂缺或使用缓存：${valuation} 项`);
      if (cnbc) rows.push(`指数报价源暂未返回：${cnbc} 项`);
      if (other) rows.push(`其他数据项待补：${other} 项`);
      return rows.length ? rows : ["有数据缺口，等待下次刷新"];
    }

    function renderAlerts() {
      const rows = alertRows();
      const dataIssues = dataIssueRows();
      const dataNotice = dataIssues.length ? `
          <article class="card data-notice">
            <div class="top">
              <div>
                <div class="name">行情数据待更新</div>
                <div class="code">数据 · ${dataIssues.length} 个标的</div>
              </div>
              <span class="pill">不交易</span>
            </div>
            <div class="signal">${safe(dataIssueMessage(dataIssues.length))}</div>
          </article>
        ` : "";
      document.getElementById("alerts").innerHTML = rows.length || dataIssues.length
        ? rows.map(row => `
          <article class="card alert-card">
            <div class="top">
              <div>
                <div class="name">${safe(row.name || row.ticker)}</div>
                <div class="code">${safe(row.ticker)} · ${safe(alertLevelLabel(row.level))} ${row.notify ? "· 通知级" : "· 观察级"}</div>
              </div>
              <span class="pill">${row.notify ? "通知" : "观察"}</span>
            </div>
            <div class="signal">${safe(row.message)}</div>
          </article>
        `).join("") + dataNotice
        : '<div class="empty">暂无提醒</div>';
    }

    function renderOverview() {
      const box = document.getElementById("overview");
      const indices = state.data?.indices || [];
      const spx = indices.find(r => r.code === "^GSPC");
      const ndx = indices.find(r => r.code === "^NDX");
      const div = indices.find(r => r.code === "H30269");
      const pulses = [];

      if (spx || ndx) {
        const spxDD = spx?.drawdown_52w != null ? `${spx.drawdown_52w.toFixed(1)}%` : "暂无";
        const ndxPE = ndx?.pe_forward != null ? ndx.pe_forward.toFixed(1) : "暂无";
        const paused = (spx?.signal || "").includes("暂停");
        pulses.push({ icon: "🌍", label: "标普 / 全球", tone: paused ? "warn" : "ok",
          text: `VOO / VT · 标普距高点 ${spxDD} · 12-18个月分批`, tag: paused ? "等待" : "新增主线" });
      } else {
        pulses.push({ icon: "🌍", label: "标普 / 全球", tone: "info", text: "VOO / VT · 12-18个月分批", tag: "新增主线" });
      }

      pulses.push({ icon: "⏸️", label: "纳指100", tone: "warn",
        text: `QQQ 已接近配置上限 · 前瞻 PE ${ndx?.pe_forward != null ? ndx.pe_forward.toFixed(1) : "暂无"}`, tag: "暂停新增" });

      if (div) {
        const dy = div.dividend_yield != null ? `${div.dividend_yield.toFixed(2)}%` : "暂无";
        const pe = div.pe_ttm != null ? div.pe_ttm.toFixed(1) : "暂无";
        const pePct = div.pe_percentile_label || "暂无";
        const sig = div.signal || "";
        const accelerate = sig.includes("加速") || sig.includes("允许买入");
        const pauseDiv = sig.includes("暂停");
        pulses.push({ icon: "🛡️", label: "红利", tone: accelerate ? "ok" : pauseDiv ? "warn" : "ok",
          text: `股息率 ${dy} · PE ${pe}（${pePct}）`, tag: accelerate ? "可加速买入" : pauseDiv ? "暂停新增" : "正常小额" });
      } else {
        pulses.push({ icon: "🛡️", label: "红利", tone: "info", text: "数据暂缺", tag: "待更新" });
      }

      pulses.push({ icon: "🧱", label: "风险边界", tone: "info",
        text: "防守层 30% · 不加杠杆 · 个股/行业ETF只作温度计", tag: "少犯错" });

      box.innerHTML = pulses.map(p => `
        <div class="pulse ${p.tone}">
          <div class="k">${p.icon} ${safe(p.label)}<span class="tag">${safe(p.tag)}</span></div>
          <div class="v">${safe(p.text)}</div>
        </div>
      `).join("");
    }

    function render() {
      renderSummary();
      renderModeChips();
      renderGroupChips();
      renderOverview();
      renderIndices();
      renderWatchlist();
      renderAlerts();
      renderGaps();
    }

    function showError(error) {
      document.getElementById("meta").textContent = "没有读到最新数据文件";
      const tip = '<div class="empty">先运行刷新脚本生成最新数据，再用本地服务器打开本页面。</div>';
      ["overview", "alerts", "indices"].forEach(id => { document.getElementById(id).innerHTML = tip; });
      document.getElementById("gaps").className = "empty";
      document.getElementById("gaps").textContent = `数据缺口：${error.message}`;
      document.getElementById("watchlist").innerHTML = `<div class="empty">${safe(error.message)}</div>`;
    }

    document.getElementById("search")?.addEventListener("input", renderWatchlist);
    document.getElementById("reload")?.addEventListener("click", () => loadData().catch(showError));
    document.getElementById("notify")?.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        alert("当前浏览器不支持通知");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") return;
      const rows = notificationRows();
      new Notification("投资观察看板", {
        body: rows.length ? `当前有 ${rows.length} 条通知级提醒` : "当前暂无通知级提醒"
      });
    });

    const sections = ["overview-section", "alerts-section", "watchlist-section", "indices-section", "gaps-section"];
    window.addEventListener("scroll", () => {
      const current = sections.findLast(id => document.getElementById(id)?.getBoundingClientRect().top < 220) || sections[0];
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
      });
    }, { passive: true });

    loadData().catch(showError);
  </script>
</body>
</html>
