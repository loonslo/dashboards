<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>投资观察看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #66717d;
      --line: #dde3ea;
      --soft: #eef2f5;
      --blue: #1769e0;
      --blue-soft: #eaf2ff;
      --green: #157a3c;
      --green-soft: #e7f4ec;
      --red: #bd2b2b;
      --red-soft: #fbe9e9;
      --amber: #8a6200;
      --amber-soft: #fbf1dc;
      --shadow: 0 8px 24px rgba(25, 35, 45, 0.07);
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 249, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .wrap {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 14px;
    }
    .hero {
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 780;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .summary-card {
      min-width: 0;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }
    .summary-card b {
      display: block;
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      line-height: 1.15;
    }
    .summary-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    input, button, .btn {
      height: 40px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    input { padding: 0 12px; }
    input:focus-visible, button:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 1px;
    }
    button {
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
      transition: border-color .15s, background .15s;
    }
    button:hover { border-color: #c2ccd6; }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 0 13px;
      color: #34404a;
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .chip:hover { border-color: #c2ccd6; }
    .chip.active {
      border-color: #b8cff8;
      background: var(--blue-soft);
      color: #174ea6;
    }
    main.wrap { padding-bottom: calc(78px + env(safe-area-inset-bottom)); }
    section {
      scroll-margin-top: 188px;
      margin: 18px 0 22px;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
    }
    .head-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 720;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .btn-sm {
      height: 30px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--blue);
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
    }
    .btn-sm:hover { border-color: #b8cff8; background: var(--blue-soft); }

    /* 概览：三张一眼看懂的状态卡 */
    .pulse-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .pulse {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--muted);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .pulse.ok { border-left-color: var(--green); }
    .pulse.warn { border-left-color: var(--amber); }
    .pulse.info { border-left-color: var(--blue); }
    .pulse .k {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 680;
    }
    .pulse .k .tag {
      margin-left: auto;
      font-size: 11px;
      font-weight: 680;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
    }
    .pulse.ok .k .tag { background: var(--green-soft); color: var(--green); }
    .pulse.warn .k .tag { background: var(--amber-soft); color: var(--amber); }
    .pulse.info .k .tag { background: var(--blue-soft); color: var(--blue); }
    .pulse .v {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .card-list {
      display: grid;
      gap: 10px;
    }
    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 13px;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover {
      transform: translateY(-1px);
      border-color: #cdd6df;
      box-shadow: 0 12px 28px rgba(25, 35, 45, 0.10);
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .name {
      min-width: 0;
      font-size: 16px;
      font-weight: 740;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .code {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
      overflow-wrap: anywhere;
    }
    .price {
      text-align: right;
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 750;
      line-height: 1.15;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .metric {
      min-width: 0;
      padding: 8px 9px;
      border-radius: 9px;
      background: var(--soft);
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .metric b {
      display: block;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 680;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .signal {
      margin-top: 11px;
      padding: 8px 10px;
      border-left: 3px solid #9db8e8;
      border-radius: 6px;
      background: #eef5ff;
      color: #174ea6;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .reason {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 132px;
      min-height: 24px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: #3c4043;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }

    /* 短线资金摘要条 + 状态标签 + 跳转 */
    .mini-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .mini {
      min-width: 0;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }
    .mini span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .mini b {
      display: block;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 650;
      background: var(--soft);
      color: var(--muted);
    }
    .tag.live { background: var(--green-soft); color: var(--green); }
    .tag.stale { background: var(--amber-soft); color: var(--amber); }
    .tag.na { background: var(--red-soft); color: var(--red); }
    .flow-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
    }
    .flow-link:hover { text-decoration: underline; }

    .gap-box, .empty {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .gap-box {
      border-color: #efd58a;
      background: #fff8e1;
      color: #5f4300;
    }
    .gap-box div + div { margin-top: 4px; }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(14px);
    }
    .bottom-nav a {
      display: grid;
      place-items: center;
      min-height: 42px;
      border-radius: 9px;
      color: #34404a;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      transition: background .15s, color .15s;
    }
    .bottom-nav a.active {
      background: var(--blue-soft);
      color: #174ea6;
    }

    .add-panel {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(66px + env(safe-area-inset-bottom));
      z-index: 7;
      display: none;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(28, 39, 49, 0.22);
    }
    .add-panel.open { display: block; }
    .add-panel h2 { margin-bottom: 12px; }
    .form-grid { display: grid; gap: 8px; }
    .form-grid input { width: 100%; }
    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .primary {
      border-color: #b8cff8;
      background: var(--blue-soft);
      color: #174ea6;
    }
    .primary:hover { border-color: #9dbcf5; }

    @media (min-width: 640px) {
      .pulse-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 820px) {
      .wrap { padding-left: 20px; padding-right: 20px; }
      .hero { grid-template-columns: minmax(0, 1fr) 360px; align-items: start; }
      .summary { grid-column: 2; grid-row: 1 / span 2; }
      .toolbar { grid-template-columns: minmax(260px, 1fr) auto; }
      .card-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bottom-nav { display: none; }
      main.wrap { padding-bottom: 28px; }
    }
    @media (min-width: 1180px) {
      .card-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 370px) {
      h1 { font-size: 19px; }
      .summary { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .price { font-size: 18px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
      html { scroll-behavior: auto; }
    }
  </style>
  <script src="../api-client.js"></script>
</head>
<body>
  <header>
    <div class="wrap hero">
      <div>
        <h1>投资观察看板</h1>
        <div id="meta" class="meta">等待数据</div>
      </div>
      <div class="summary" aria-label="摘要">
        <div class="summary-card"><b id="indexCount">-</b><span>核心指数</span></div>
        <div class="summary-card"><b id="watchCount">-</b><span>观察标的</span></div>
        <div class="summary-card"><b id="alertCount">-</b><span>观察提醒</span></div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜代码、名称、分组">
        <button id="reload" type="button">刷新</button>
      </div>
      <nav id="modeChips" class="chips" aria-label="快速筛选"></nav>
      <nav id="groupChips" class="chips" aria-label="分组筛选"></nav>
    </div>
  </header>

  <main class="wrap">
    <section id="overview-section">
      <div class="section-head">
        <h2>持仓概览</h2>
        <span class="hint">一屏看清节奏</span>
      </div>
      <div id="overview" class="pulse-grid"></div>
    </section>

    <section id="indices-section">
      <div class="section-head">
        <h2>核心指数</h2>
        <span class="hint">先看仓位节奏</span>
      </div>
      <div id="indices" class="card-list"></div>
    </section>

    <section id="short-flow-section">
      <div class="section-head">
        <h2>短线资金跟随</h2>
        <span class="hint">资金流与观察条件</span>
      </div>
      <div id="shortFlow"></div>
    </section>

    <section id="watchlist-section">
      <div class="section-head">
        <h2>观察池</h2>
        <div class="head-actions">
          <span id="watchHint" class="hint">筛选后 - 个</span>
          <button id="openAdd" class="btn-sm" type="button">+ 添加</button>
        </div>
      </div>
      <div id="watchlist" class="card-list"></div>
    </section>

    <section id="alerts-section">
      <div class="section-head">
        <h2>提醒</h2>
        <button id="notify" class="btn-sm" type="button">开启通知</button>
      </div>
      <div id="alerts" class="card-list"></div>
    </section>

    <section id="gaps-section">
      <div class="section-head">
        <h2>数据缺口</h2>
        <span class="hint">不假装完整</span>
      </div>
      <div id="gaps" class="empty">暂无数据</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="页面导航">
    <a href="#overview-section" class="active">概览</a>
    <a href="#indices-section">指数</a>
    <a href="#short-flow-section">资金</a>
    <a href="#watchlist-section">观察</a>
    <a href="#alerts-section">提醒</a>
    <a href="#gaps-section">缺口</a>
  </nav>

  <div id="addPanel" class="add-panel" role="dialog" aria-label="添加观察标的">
    <h2>添加观察标的</h2>
    <div class="form-grid">
      <input id="addTicker" placeholder="代码，例如 MSFT / 0700.HK / 600900.SH">
      <input id="addName" placeholder="名称，例如 Microsoft">
      <input id="addGroup" placeholder="分组，例如 临时观察">
      <input id="addReason" placeholder="观察理由">
    </div>
    <div class="form-actions">
      <button id="closeAdd" type="button">取消</button>
      <button id="saveAdd" class="primary" type="button">保存</button>
    </div>
  </div>

  <script>
    const LOCAL_KEY = "finance_dashboard_local_watchlist_v1";
    const state = { data: null, shortFlow: null, mode: "all", group: "", localItems: [] };
    const fmt = (v, d = 2) => v === null || v === undefined || Number.isNaN(Number(v)) ? "N/A" : Number(v).toFixed(d);
    const pct = (v, d = 1) => v === null || v === undefined || Number.isNaN(Number(v)) ? "N/A" : `${Number(v).toFixed(d)}%`;
    const cls = v => Number(v) > 0 ? "pos" : Number(v) < 0 ? "neg" : "flat";
    const safe = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

    async function loadData() {
      state.data = await DashboardApi.fetchLatest("index-decision", "dashboard_latest.json");
      try {
        state.shortFlow = await DashboardApi.fetchLatest("short-flow", "../short-flow/dashboard_latest.json");
      } catch {
        state.shortFlow = null;
      }
      state.localItems = loadLocalItems();
      render();
    }

    function loadLocalItems() {
      try {
        const rows = JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]");
        return Array.isArray(rows) ? rows : [];
      } catch {
        return [];
      }
    }

    function saveLocalItems(rows) {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(rows));
      state.localItems = rows;
    }

    function watchRows() {
      const backendRows = state.data?.watchlist || [];
      const localRows = state.localItems.map(row => ({
        ...row,
        signal: "本机新增：待接入后端抓数",
        has_alert: true,
        alerts: [{ ticker: row.ticker, name: row.name, level: "local", notify: false, message: "本机新增标的，待接入后端抓数" }],
        current: null,
        change_1d_pct: null,
        drawdown_52w: null,
        return_1m: null,
        return_3m: null
      }));
      return [...backendRows, ...localRows];
    }

    function assetCard(row, options = {}) {
      const isIndex = options.type === "index";
      const codeLine = isIndex ? `${row.code} · ${row.product || "-"}` : `${row.ticker} · ${row.market}`;
      const title = row.name || row.ticker || row.code;
      const group = row.group || row.kind || "指数";
      const peLine = isIndex ? `${fmt(row.pe_ttm)} / ${pct(row.dividend_yield, 2)}` : `${pct(row.return_1m)} / ${pct(row.return_3m)}`;
      const peLabel = isIndex ? "PE/股息" : "1月/3月";
      return `
        <article class="card">
          <div class="top">
            <div>
              <div class="name">${safe(title)}</div>
              <div class="code">${safe(codeLine)}</div>
            </div>
            <div>
              <div class="price">${fmt(row.current)}</div>
              <div style="text-align:right;margin-top:6px"><span class="pill">${safe(group)}</span></div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>较前日</span><b class="${cls(row.change_1d_pct)}">${pct(row.change_1d_pct)}</b></div>
            <div class="metric"><span>距高点</span><b class="${cls(row.drawdown_52w)}">${pct(row.drawdown_52w)}</b></div>
            <div class="metric"><span>${peLabel}</span><b>${peLine}</b></div>
          </div>
          <div class="signal">${safe(row.signal || "正常观察")}</div>
          ${row.reason ? `<div class="reason">${safe(row.reason)}</div>` : ""}
        </article>
      `;
    }

    function renderSummary() {
      document.getElementById("indexCount").textContent = state.data?.indices?.length ?? 0;
      document.getElementById("watchCount").textContent = watchRows().length;
      document.getElementById("alertCount").textContent = alertRows().length;
      document.getElementById("meta").textContent = `生成时间：${state.data?.asof || "N/A"} · 只做观察，不执行交易`;
    }

    function alertRows() {
      const backendAlerts = state.data?.alerts || [];
      const localAlerts = state.localItems.map(row => ({
        ticker: row.ticker,
        name: row.name,
        level: "local",
        notify: false,
        message: "本机新增标的，待接入后端抓数"
      }));
      return [...backendAlerts, ...localAlerts];
    }

    function notificationRows() {
      const backendRows = state.data?.notifications || [];
      return [...backendRows];
    }

    function renderModeChips() {
      const modes = [
        ["all", "全部"],
        ["alert", "有提醒"],
        ["core", "核心"],
        ["US", "美股"],
        ["HK", "港股"],
        ["CN", "A股"]
      ];
      const chips = document.getElementById("modeChips");
      chips.innerHTML = modes.map(([mode, label]) =>
        `<button class="chip ${state.mode === mode ? "active" : ""}" data-mode="${mode}">${label}</button>`
      ).join("");
      chips.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.mode = button.dataset.mode || "all";
          renderModeChips();
          renderWatchlist();
        });
      });
    }

    function renderGroupChips() {
      const groups = [...new Set(watchRows().map(row => row.group).filter(Boolean))].sort();
      const chips = document.getElementById("groupChips");
      const allActive = state.group === "";
      chips.innerHTML = `<button class="chip ${allActive ? "active" : ""}" data-group="">全部</button>` +
        groups.map(group => `<button class="chip ${state.group === group ? "active" : ""}" data-group="${safe(group)}">${safe(group)}</button>`).join("");
      chips.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.group = button.dataset.group || "";
          renderGroupChips();
          renderWatchlist();
        });
      });
    }

    function money(v) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "N/A";
      const value = Number(v);
      const abs = Math.abs(value);
      if (abs >= 100000000) return `${(value / 100000000).toFixed(2)}亿`;
      if (abs >= 10000) return `${(value / 10000).toFixed(0)}万`;
      return value.toFixed(0);
    }

    function dataStatusClass(status) {
      return status === "live" ? "live" : status === "stale" ? "stale" : "na";
    }

    function renderShortFlow() {
      const box = document.getElementById("shortFlow");
      const data = state.shortFlow;
      if (!data) {
        box.innerHTML = '<div class="empty">未读取到 short-flow 数据。可先运行 scripts/refresh_short_flow.sh。</div>';
        return;
      }
      const source = data.source_status || {};
      const counts = data.status_counts || {};
      const picks = (data.watch_signals || []).slice(0, 3);
      const cards = picks.length ? picks.map(row => `
        <article class="card">
          <div class="top">
            <div>
              <div class="name">${safe(row.display_name || row.name || row.code)}</div>
              <div class="code">${safe(row.code)} · ${safe(row.group)} · <span class="tag ${dataStatusClass(row.data_status)}">${safe(row.data_status || "unknown")}</span></div>
            </div>
            <div class="price ${cls(row.main_net)}">${money(row.main_net)}</div>
          </div>
          <div class="metrics">
            <div class="metric"><span>状态</span><b>${safe(row.status || "N/A")}</b></div>
            <div class="metric"><span>涨跌幅</span><b class="${cls(row.pct)}">${pct(row.pct)}</b></div>
            <div class="metric"><span>主力占比</span><b class="${cls(row.main_net_pct)}">${pct(row.main_net_pct)}</b></div>
          </div>
          <div class="signal">${safe(row.next_trigger || row.reason || "等待资金确认")}</div>
          ${row.failure ? `<div class="reason">失败条件：${safe(row.failure)}</div>` : ""}
        </article>
      `).join("") : '<div class="empty">观察池暂无可展示标的。</div>';
      box.innerHTML = `
        <div class="mini-strip">
          <div class="mini"><span>Focus watch</span><b>${counts["Focus watch"] || 0}</b></div>
          <div class="mini"><span>Wait / Exclude</span><b>${(counts["Wait for strength"] || 0) + (counts["Exclude for now"] || 0)}</b></div>
          <div class="mini"><span>接口 live/stale/NA</span><b>${source.live_rows || 0}/${source.stale_rows || 0}/${source.unavailable_rows || 0}</b></div>
        </div>
        <div class="card-list">${cards}</div>
        <a class="flow-link" href="../short-flow/">打开完整 short-flow 看板 →</a>
      `;
    }

    function renderIndices() {
      document.getElementById("indices").innerHTML = (state.data?.indices || [])
        .map(row => assetCard(row, { type: "index" }))
        .join("");
    }

    function filteredWatchlist() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      return watchRows().filter(row => {
        const text = `${row.ticker} ${row.name} ${row.group} ${row.market}`.toLowerCase();
        const modeOk =
          state.mode === "all" ||
          (state.mode === "alert" && row.has_alert) ||
          (state.mode === "core" && row.priority === "core") ||
          row.market === state.mode;
        return modeOk && (!query || text.includes(query)) && (!state.group || row.group === state.group);
      });
    }

    function renderWatchlist() {
      const rows = filteredWatchlist();
      document.getElementById("watchHint").textContent = `筛选后 ${rows.length} 个`;
      document.getElementById("watchlist").innerHTML = rows.length
        ? rows.map(row => assetCard(row)).join("")
        : '<div class="empty">没有匹配的观察标的</div>';
    }

    function renderGaps() {
      const gaps = state.data?.data_gaps || [];
      const box = document.getElementById("gaps");
      box.className = gaps.length ? "gap-box" : "empty";
      box.innerHTML = gaps.length ? gaps.map(gap => `<div>· ${safe(gap)}</div>`).join("") : "暂无数据缺口";
    }

    function renderAlerts() {
      const rows = alertRows();
      document.getElementById("alerts").innerHTML = rows.length
        ? rows.map(row => `
          <article class="card">
            <div class="top">
              <div>
                <div class="name">${safe(row.name || row.ticker)}</div>
                <div class="code">${safe(row.ticker)} · ${safe(row.level || "alert")} ${row.notify ? "· 通知级" : "· 观察级"}</div>
              </div>
              <span class="pill">${row.notify ? "通知" : "观察"}</span>
            </div>
            <div class="signal">${safe(row.message)}</div>
          </article>
        `).join("")
        : '<div class="empty">暂无提醒</div>';
    }

    function renderOverview() {
      const box = document.getElementById("overview");
      const indices = state.data?.indices || [];
      const shortFlow = state.shortFlow;
      const spx = indices.find(r => r.code === "^GSPC");
      const ndx = indices.find(r => r.code === "^NDX");
      const div = indices.find(r => r.code === "H30269");
      const pulses = [];

      if (spx || ndx) {
        const spxDD = spx?.drawdown_52w != null ? `${spx.drawdown_52w.toFixed(1)}%` : "N/A";
        const ndxPE = ndx?.pe_forward != null ? ndx.pe_forward.toFixed(1) : "N/A";
        const paused = (spx?.signal || "").includes("暂停");
        pulses.push({ icon: "📈", label: "美股", tone: paused ? "warn" : "ok",
          text: `标普距高点 ${spxDD} · 纳指前瞻 PE ${ndxPE}`, tag: paused ? "暂停新增" : "正常定投" });
      } else {
        pulses.push({ icon: "📈", label: "美股", tone: "info", text: "数据暂缺", tag: "待更新" });
      }

      if (div) {
        const dy = div.dividend_yield != null ? `${div.dividend_yield.toFixed(2)}%` : "N/A";
        const pe = div.pe_ttm != null ? div.pe_ttm.toFixed(1) : "N/A";
        const pePct = div.pe_percentile_label || "N/A";
        const sig = div.signal || "";
        const accelerate = sig.includes("加速") || sig.includes("允许买入");
        const pauseDiv = sig.includes("暂停");
        pulses.push({ icon: "🛡️", label: "红利", tone: accelerate ? "ok" : pauseDiv ? "warn" : "ok",
          text: `股息率 ${dy} · PE ${pe}（${pePct}）`, tag: accelerate ? "可加速买入" : pauseDiv ? "暂停新增" : "正常小额" });
      } else {
        pulses.push({ icon: "🛡️", label: "红利", tone: "info", text: "数据暂缺", tag: "待更新" });
      }

      if (shortFlow) {
        const counts = shortFlow.status_counts || {};
        const focusCount = counts["Focus watch"] || 0;
        const waitCount = counts["Wait for strength"] || 0;
        const asof = shortFlow.asof || "N/A";
        pulses.push({ icon: "⚡", label: "A股短线", tone: focusCount > 0 ? "ok" : "info",
          text: `Focus ${focusCount} · Wait ${waitCount} · ${asof}`, tag: focusCount > 0 ? "有机会" : "观望" });
      } else {
        pulses.push({ icon: "⚡", label: "A股短线", tone: "info", text: "数据暂缺", tag: "待更新" });
      }

      box.innerHTML = pulses.map(p => `
        <div class="pulse ${p.tone}">
          <div class="k">${p.icon} ${safe(p.label)}<span class="tag">${safe(p.tag)}</span></div>
          <div class="v">${safe(p.text)}</div>
        </div>
      `).join("");
    }

    function render() {
      renderSummary();
      renderModeChips();
      renderGroupChips();
      renderOverview();
      renderIndices();
      renderShortFlow();
      renderWatchlist();
      renderAlerts();
      renderGaps();
    }

    function showError(error) {
      document.getElementById("meta").textContent = "没有读到 dashboard_latest.json";
      document.getElementById("indices").innerHTML = '<div class="empty">先运行脚本生成 dashboard_latest.json，再用本地服务器打开本页面。</div>';
      document.getElementById("watchlist").innerHTML = `<div class="empty">${safe(error.message)}</div>`;
    }

    document.getElementById("search")?.addEventListener("input", renderWatchlist);
    document.getElementById("reload")?.addEventListener("click", () => loadData().catch(showError));
    document.getElementById("openAdd")?.addEventListener("click", () => {
      document.getElementById("addPanel").classList.add("open");
      document.getElementById("addTicker").focus();
    });
    document.getElementById("closeAdd")?.addEventListener("click", () => {
      document.getElementById("addPanel").classList.remove("open");
    });
    document.getElementById("saveAdd")?.addEventListener("click", () => {
      const ticker = document.getElementById("addTicker").value.trim().toUpperCase();
      if (!ticker) return;
      const row = {
        market: ticker.endsWith(".HK") ? "HK" : ticker.endsWith(".SH") || ticker.endsWith(".SZ") ? "CN" : "US",
        ticker,
        name: document.getElementById("addName").value.trim() || ticker,
        group: document.getElementById("addGroup").value.trim() || "本机新增",
        reason: document.getElementById("addReason").value.trim() || "手动添加观察",
        priority: "local"
      };
      const rows = loadLocalItems().filter(item => item.ticker !== ticker);
      rows.push(row);
      saveLocalItems(rows);
      document.querySelectorAll("#addTicker,#addName,#addGroup,#addReason").forEach(input => input.value = "");
      document.getElementById("addPanel").classList.remove("open");
      renderSummary();
      renderModeChips();
      renderGroupChips();
      renderWatchlist();
      renderAlerts();
    });

    document.getElementById("notify")?.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        alert("当前浏览器不支持通知");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") return;
      const rows = notificationRows();
      new Notification("投资观察看板", {
        body: rows.length ? `当前有 ${rows.length} 条通知级提醒` : "当前暂无通知级提醒"
      });
    });

    const sections = ["overview-section", "indices-section", "short-flow-section", "watchlist-section", "alerts-section", "gaps-section"];
    window.addEventListener("scroll", () => {
      const current = sections.findLast(id => document.getElementById(id)?.getBoundingClientRect().top < 220) || sections[0];
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
      });
    }, { passive: true });

    loadData().catch(showError);
  </script>
</body>
</html>
