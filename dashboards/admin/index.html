<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Admin</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    .wrap {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    header {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .toolbar, .panel, .form {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
    }
    select, input, textarea, button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    select, input, textarea {
      padding: 8px 10px;
    }
    button {
      cursor: pointer;
      padding: 8px 12px;
      font-weight: 650;
    }
    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    button.danger {
      border-color: #f0c9c4;
      color: var(--danger);
    }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }
    .layout {
      display: grid;
      gap: 12px;
    }
    .config-panel {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .config-panel.active {
      display: grid;
      gap: 10px;
    }
    .panel {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 13px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 650;
      white-space: nowrap;
    }
    .form {
      display: grid;
      gap: 10px;
      padding: 12px;
    }
    .fields {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    label span {
      font-weight: 650;
    }
    textarea {
      min-height: 76px;
      resize: vertical;
    }
    .muted {
      color: var(--muted);
    }
    @media (min-width: 900px) {
      .layout { grid-template-columns: 1fr 340px; align-items: start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Dashboard Admin</h1>
      <div class="sub">可选管理工具：需先启动 API 服务。生产数据由 GitHub Actions 定时刷新。</div>
    </header>

    <div class="toolbar">
      <select id="dashboard">
        <option value="index-decision">投资观察</option>
        <option value="short-flow">A股短线</option>
      </select>
      <button id="reload" type="button">读取</button>
      <button id="refresh" class="primary" type="button">刷新数据</button>
      <button id="refreshEtf" type="button">刷新ETF训练仓</button>
      <input id="apiBase" type="url" placeholder="https://你的服务器域名">
      <button id="saveApiBase" type="button">保存API地址</button>
      <input id="apiToken" type="password" placeholder="管理 Token（仅保存在本机）">
      <button id="saveApiToken" type="button">保存 Token</button>
      <span id="status" class="status">等待连接</span>
    </div>

    <section class="layout">
      <div class="panel">
        <table>
          <thead>
            <tr>
              <th>代码</th>
              <th>名称</th>
              <th>分组</th>
              <th>优先级</th>
              <th>备注</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <form id="form" class="form">
        <div class="muted">新增或覆盖同代码标的</div>
        <div id="fields" class="fields"></div>
        <label>
          <span>备注</span>
          <textarea id="note"></textarea>
        </label>
        <button class="primary" type="submit">保存到数据库</button>
      </form>
    </section>

    <section id="configPanel" class="config-panel">
      <div class="muted">A股短线规则配置</div>
      <form id="configForm" class="form">
        <div class="fields">
          <label><span>训练本金</span><input name="capital.train_capital" type="number" step="1"></label>
          <label><span>总敞口上限</span><input name="capital.max_total_exposure_pct" type="number" step="0.01"></label>
          <label><span>首笔比例</span><input name="capital.first_entry_ratio" type="number" step="0.01"></label>
          <label><span>单ETF上限</span><input name="capital.max_single_etf_pct" type="number" step="0.01"></label>
          <label><span>允许类别</span><input name="features.allowed_train_categories" placeholder="CORE,GROWTH"></label>
          <label><span>最低成交额</span><input name="filters.min_amount" type="number" step="1"></label>
          <label><span>主力流入占比</span><input name="filters.min_main_inflow_pct" type="number" step="0.1"></label>
          <label><span>下跌退出天数</span><input name="regime.trend_down_exit_days" type="number" step="1"></label>
          <label><span>趋势向上敞口</span><input name="regime.trend_up.max_exposure_pct" type="number" step="0.01"></label>
          <label><span>趋势向上持仓数</span><input name="regime.trend_up.max_positions" type="number" step="1"></label>
          <label><span>震荡敞口</span><input name="regime.range.max_exposure_pct" type="number" step="0.01"></label>
          <label><span>震荡持仓数</span><input name="regime.range.max_positions" type="number" step="1"></label>
          <label><span>主题ETF</span><select name="features.theme_enabled"><option value="false">关闭</option><option value="true">启用</option></select></label>
          <label><span>要求主力转正</span><select name="filters.require_main_inflow_positive"><option value="true">是</option><option value="false">否</option></select></label>
          <label><span>LangGraph/LLM</span><select name="features.use_llm"><option value="false">关闭</option><option value="true">启用</option></select></label>
        </div>
        <button class="primary" type="submit">保存短线配置</button>
      </form>
    </section>
  </main>

  <script src="../shared/api-client.js"></script>
  <script src="../shared/format.js"></script>
  <script>
    const { safe } = DashFmt;
    const state = { dashboard: "index-decision", items: [], config: null };
    const status = document.getElementById("status");

    function setStatus(text) {
      status.textContent = text;
    }

    function keyOf(item) {
      return state.dashboard === "index-decision" ? item.ticker : item.code;
    }

    function renderFields() {
      const indexFields = [
        ["market", "市场", "US"],
        ["ticker", "代码", "AAPL"],
        ["name", "名称", "Apple"],
        ["group", "分组", "美股核心平台"],
        ["priority", "优先级", "normal"],
        ["alert_drawdown_pct", "回撤提醒", "-12"],
        ["alert_1d_abs_pct", "单日波动", "4"],
        ["alert_1m_pct", "1月走弱", "-8"]
      ];
      const shortFields = [
        ["code", "代码", "510300"],
        ["name", "名称", "沪深300ETF"],
        ["group", "分组", "宽基"],
        ["role", "角色", "market"],
        ["priority", "优先级", "normal"],
        ["key_level", "关键位", ""]
      ];
      const fields = state.dashboard === "index-decision" ? indexFields : shortFields;
      document.getElementById("fields").innerHTML = fields.map(([id, label, placeholder]) => `
        <label>
          <span>${safe(label)}</span>
          <input id="${safe(id)}" name="${safe(id)}" placeholder="${safe(placeholder)}">
        </label>
      `).join("");
      document.getElementById("note").placeholder = state.dashboard === "index-decision" ? "reason" : "plan_note";
    }

    function renderRows() {
      document.getElementById("rows").innerHTML = state.items.map(item => {
        const key = keyOf(item);
        const note = state.dashboard === "index-decision" ? item.reason : item.plan_note;
        const extra = state.dashboard === "index-decision" ? item.market : item.role;
        return `
          <tr>
            <td><b>${safe(key)}</b><div class="muted">${safe(extra || "")}</div></td>
            <td>${safe(item.name || "")}</td>
            <td>${safe(item.group || "")}</td>
            <td>${safe(item.priority || "")}</td>
            <td>${safe(note || "")}</td>
            <td><button class="danger" type="button" data-delete="${safe(key)}">删除</button></td>
          </tr>
        `;
      }).join("");
      document.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", async () => {
          await DashboardApi.api(`/api/watchlists/${state.dashboard}/${encodeURIComponent(button.dataset.delete)}`, { method: "DELETE" });
          await loadWatchlist();
        });
      });
    }

    async function loadWatchlist() {
      setStatus("读取中");
      const data = await DashboardApi.api(`/api/watchlists/${state.dashboard}`);
      state.items = data.items || [];
      renderFields();
      renderRows();
      await loadConfig();
      setStatus(`已读取 ${state.items.length} 个`);
    }

    function getPath(root, path) {
      return path.split(".").reduce((obj, key) => obj && obj[key], root);
    }

    function setPath(root, path, value) {
      const keys = path.split(".");
      let cursor = root;
      keys.slice(0, -1).forEach(key => {
        cursor[key] = cursor[key] || {};
        cursor = cursor[key];
      });
      cursor[keys[keys.length - 1]] = value;
    }

    async function loadConfig() {
      const panel = document.getElementById("configPanel");
      if (state.dashboard !== "short-flow") {
        panel.classList.remove("active");
        return;
      }
      panel.classList.add("active");
      state.config = await DashboardApi.api("/api/config/short-flow");
      document.querySelectorAll("#configForm [name]").forEach(input => {
        const value = getPath(state.config, input.name);
        input.value = value === undefined || value === null ? "" : String(value);
      });
    }

    function formPayload() {
      const data = {};
      new FormData(document.getElementById("form")).forEach((value, key) => {
        const trimmed = String(value).trim();
        if (!trimmed) return;
        const numeric = Number(trimmed);
        data[key] = Number.isFinite(numeric) && /pct|level/.test(key) ? numeric : trimmed;
      });
      const note = document.getElementById("note").value.trim();
      if (note) data[state.dashboard === "index-decision" ? "reason" : "plan_note"] = note;
      return data;
    }

    function configPayload() {
      const payload = {};
      document.querySelectorAll("#configForm [name]").forEach(input => {
        const raw = input.value.trim();
        if (raw === "") return;
        let value = raw;
        if (raw === "true" || raw === "false") value = raw === "true";
        else if (input.type === "number") value = Number(raw);
        setPath(payload, input.name, value);
      });
      return payload;
    }

    document.getElementById("dashboard").addEventListener("change", event => {
      state.dashboard = event.target.value;
      loadWatchlist().catch(error => setStatus(error.message));
    });
    document.getElementById("reload").addEventListener("click", () => loadWatchlist().catch(error => setStatus(error.message)));
    document.getElementById("refresh").addEventListener("click", async () => {
      setStatus("刷新中，可能需要几十秒");
      await DashboardApi.api(`/api/refresh/${state.dashboard}`, { method: "POST", body: "{}" });
      setStatus("刷新完成");
    });
    document.getElementById("refreshEtf").addEventListener("click", async () => {
      setStatus("ETF训练仓刷新中");
      await DashboardApi.api("/api/refresh/etf-pool", { method: "POST", body: "{}" });
      setStatus("ETF训练仓刷新完成");
    });
    document.getElementById("saveApiBase").addEventListener("click", async () => {
      const value = document.getElementById("apiBase").value.trim().replace(/\/+$/, "");
      if (value) {
        localStorage.setItem("dashboard_api_base", value);
      } else {
        localStorage.removeItem("dashboard_api_base");
      }
      setStatus(value ? `API地址已保存：${value}` : "已清空API地址");
      await loadWatchlist();
    });
    document.getElementById("saveApiToken").addEventListener("click", async () => {
      const value = document.getElementById("apiToken").value.trim();
      if (value) localStorage.setItem("dashboard_api_token", value);
      else localStorage.removeItem("dashboard_api_token");
      setStatus(value ? "管理 Token 已保存在本机" : "管理 Token 已清空");
      await loadWatchlist();
    });
    document.getElementById("form").addEventListener("submit", async event => {
      event.preventDefault();
      await DashboardApi.api(`/api/watchlists/${state.dashboard}`, { method: "POST", body: JSON.stringify(formPayload()) });
      event.target.reset();
      await loadWatchlist();
    });
    document.getElementById("configForm").addEventListener("submit", async event => {
      event.preventDefault();
      state.config = await DashboardApi.api("/api/config/short-flow", { method: "POST", body: JSON.stringify(configPayload()) });
      await loadConfig();
      setStatus("短线配置已保存");
    });

    DashboardApi.apiBase().then(base => {
      document.getElementById("apiBase").value = base;
      document.getElementById("apiToken").value = localStorage.getItem("dashboard_api_token") || "";
      return loadWatchlist();
    }).catch(error => setStatus(error.message));
  </script>
</body>
</html>
