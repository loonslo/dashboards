<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A股短线资金跟随看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #66717d;
      --line: #dde3ea;
      --soft: #eef2f5;
      --blue: #1769e0;
      --green: #157a3c;
      --green-soft: #e7f4ec;
      --red: #bd2b2b;
      --red-soft: #fbe9e9;
      --amber: #8a6200;
      --amber-soft: #fbf1dc;
      --blue-soft: #eaf2ff;
      --shadow: 0 8px 24px rgba(25, 35, 45, 0.07);
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.96);
      backdrop-filter: blur(14px);
    }
    .wrap {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 14px;
    }
    .hero {
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 780;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .summary-card {
      min-width: 0;
      min-height: 56px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .summary-card b {
      display: block;
      font-size: 18px;
      line-height: 1.15;
    }
    .summary-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    input, button, select {
      min-width: 0;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    input { padding: 0 12px; }
    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 650;
    }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: #34404a;
      font-size: 13px;
      font-weight: 650;
    }
    .chip.active {
      border-color: #b8cff8;
      background: #eaf2ff;
      color: #174ea6;
    }
    main.wrap { padding-bottom: 82px; }
    section {
      scroll-margin-top: 178px;
      margin: 16px 0 22px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .section-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      margin-left: auto;
    }
    .session-select {
      width: min(100%, 238px);
      height: 34px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: 13px;
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    .rank-grid {
      display: grid;
      gap: 10px;
    }
    .card {
      min-width: 0;
      min-height: 214px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 11px;
      display: flex;
      flex-direction: column;
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      min-height: 45px;
    }
    .name {
      min-width: 0;
      font-size: 16px;
      font-weight: 760;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .code {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .price {
      text-align: right;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .metric {
      min-width: 0;
      min-height: 54px;
      height: 68px;
      padding: 8px;
      border-radius: 8px;
      background: var(--soft);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .metric b {
      display: block;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .signal {
      margin-top: 10px;
      min-height: 56px;
      padding: 8px 9px;
      border-radius: 8px;
      background: #eef5ff;
      color: #174ea6;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      display: flex;
      align-items: center;
    }
    .signal.wait {
      background: #fff7e6;
      color: var(--amber);
    }
    .signal.exclude {
      background: #fdeeee;
      color: var(--red);
    }
    .reason, .plan {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 132px;
      min-height: 25px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f1f3f4;
      color: #3c4043;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }
    .primary {
      border-color: #b8cff8;
      background: #eaf2ff;
      color: #174ea6;
    }
    .empty, .gap-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .gap-box {
      border-color: #efd58a;
      background: #fff8e1;
      color: #5f4300;
    }
    .attention-grid {
      display: grid;
      gap: 10px;
    }
    .attention-card {
      min-height: 0;
      padding: 12px;
    }
    .attention-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .attention-source {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .attention-card .signal {
      min-height: 0;
      align-items: flex-start;
    }
    .etf-overview {
      display: grid;
      gap: 12px;
      margin-bottom: 10px;
    }
    .etf-status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .status-card {
      min-width: 0;
      min-height: 68px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .status-card.primary {
      border-left: 3px solid var(--blue);
      background: linear-gradient(90deg, var(--blue-soft), #fff 55%);
    }
    .status-card.ok {
      border-left: 3px solid var(--green);
      background: linear-gradient(90deg, var(--green-soft), #fff 55%);
    }
    .status-card.warn {
      border-left: 3px solid var(--amber);
      background: linear-gradient(90deg, var(--amber-soft), #fff 55%);
    }
    .status-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }
    .status-card b {
      display: block;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 17px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .guardrail-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .guardrail {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }
    .guardrail b {
      color: var(--text);
      font-family: var(--mono);
      font-weight: 700;
    }
    .etf-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .etf-mini {
      min-width: 0;
      min-height: 58px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .etf-mini span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .etf-mini b {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .decision-grid {
      display: grid;
      gap: 10px;
      align-items: stretch;
    }
    .decision-card {
      display: grid;
      gap: 8px;
      min-height: 226px;
      padding: 10px;
      align-content: start;
    }
    .decision-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
    }
    .decision-title {
      font-size: 15px;
      font-weight: 760;
      line-height: 1.2;
    }
    .decision-count {
      flex: 0 0 auto;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .decision-card.focus .decision-count { background: var(--green-soft); color: var(--green); }
    .decision-card.wait .decision-count { background: var(--amber-soft); color: var(--amber); }
    .decision-card.exclude .decision-count { background: var(--red-soft); color: var(--red); }
    .decision-list {
      display: grid;
      gap: 7px;
    }
    .decision-row {
      min-width: 0;
      min-height: 72px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .decision-row.compact {
      min-height: 52px;
      padding: 7px 8px;
    }
    .decision-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .decision-main b {
      min-width: 0;
      font-size: 13px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .score-pill {
      flex: 0 0 auto;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--soft);
      color: #3c4043;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
    }
    .decision-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .decision-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3px;
      margin-top: 5px;
      color: #4d5a66;
      font-size: 12px;
      line-height: 1.35;
    }
    .decision-meta span {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .decision-more {
      padding: 7px 8px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .table-wrap {
      overflow-x: visible;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
      table-layout: fixed;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fafbfc;
    }
    tr:last-child td { border-bottom: 0; }
    .rank-table th, .rank-table td {
      padding: 8px 8px;
      vertical-align: top;
    }
    .rank-table th:first-child, .rank-table td:first-child { width: 36%; }
    .rank-table th:nth-child(2), .rank-table td:nth-child(2) { width: 19%; }
    .rank-name {
      display: block;
      color: var(--text);
      font-weight: 650;
      line-height: 1.25;
    }
    .rank-code {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }
    .journal-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .journal-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    .journal-panel {
      display: none;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      margin-bottom: 10px;
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(14px);
    }
    .bottom-nav a {
      font-size: 11px;
      display: grid;
      place-items: center;
      min-height: 42px;
      border-radius: 8px;
      color: #34404a;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }
    .bottom-nav a.active {
      background: #eaf2ff;
      color: #174ea6;
    }
    @media (min-width: 820px) {
      .wrap { padding-left: 20px; padding-right: 20px; }
      .hero { grid-template-columns: minmax(0, 1fr) 360px; align-items: start; }
      .summary { grid-column: 2; grid-row: 1 / span 2; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rank-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .etf-status-grid { grid-template-columns: 1.2fr 1fr 1fr 1fr; }
      .etf-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .decision-grid { grid-template-columns: minmax(190px, .75fr) minmax(260px, 1fr) minmax(320px, 1.35fr); }
      .journal-stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .bottom-nav { display: none; }
      main.wrap { padding-bottom: 28px; }
    }
    @media (min-width: 1180px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 370px) {
      h1 { font-size: 20px; }
      .summary, .metrics { grid-template-columns: 1fr; }
      .price { font-size: 18px; }
    }
    @media (max-width: 520px) {
      .section-head { align-items: flex-start; }
      .section-tools {
        width: 100%;
        justify-content: stretch;
      }
      .session-select { width: 100%; }
      .hint { white-space: normal; }
      .rank-table { font-size: 12px; }
      .rank-table th, .rank-table td { padding: 7px 6px; }
      .rank-table th:first-child, .rank-table td:first-child { width: 34%; }
      .rank-table th:nth-child(2), .rank-table td:nth-child(2) { width: 18%; }
      .etf-status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .decision-meta { grid-template-columns: 1fr; }
      .journal-actions { grid-template-columns: 1fr 82px; }
    }
  </style>
  <script src="../api-client.js"></script>
</head>
<body>
  <header>
    <div class="wrap hero">
      <div>
        <h1>A股短线资金跟随看板</h1>
        <div id="meta" class="meta">等待数据</div>
      </div>
      <div class="summary" aria-label="摘要">
        <div class="summary-card"><b id="marketCount">-</b><span>市场/板块</span></div>
        <div class="summary-card"><b id="focusCount">-</b><span>可观察</span></div>
        <div class="summary-card"><b id="waitCount">-</b><span>待观察/待排除</span></div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" list="instrumentOptions" placeholder="搜代码、名称、分组、状态">
        <button id="reload" type="button">刷新</button>
      </div>
      <nav id="chips" class="chips" aria-label="快速筛选"></nav>
    </div>
  </header>

  <main class="wrap">
    <section id="filter-empty" style="display:none">
      <div class="empty">请选择一个筛选，或点击“全部”查看所有内容。</div>
    </section>

    <section id="focus-section">
      <div class="section-head">
        <h2 id="focusTitle">今日关注</h2>
        <span id="focusHint" class="hint">优先处理可观察</span>
      </div>
      <div id="focusPanel" class="attention-grid"></div>
    </section>

    <section id="etf-section">
      <div class="section-head">
        <h2>ETF训练仓</h2>
        <div class="section-tools">
          <select id="etfSession" class="session-select">
            <option value="latest">最新报告</option>
            <option value="0850">08:50 盘前</option>
            <option value="0940">09:40 盘中确认</option>
            <option value="1130">11:30 午间</option>
            <option value="1430">14:30 尾盘</option>
            <option value="1520">15:20 盘后</option>
          </select>
          <span id="etfHint" class="hint">等待数据</span>
        </div>
      </div>
      <div id="etfPool" class="empty">等待数据</div>
    </section>

    <section id="rank-section">
      <div class="section-head">
        <h2>资金流排名</h2>
        <span class="hint">佐证资金方向</span>
      </div>
      <div class="rank-grid">
        <div class="table-wrap">
          <table class="rank-table">
            <thead><tr><th>流入</th><th>分组</th><th>涨跌</th><th>主力净额</th><th>占比</th></tr></thead>
            <tbody id="inflowRows"></tbody>
          </table>
        </div>
        <div class="table-wrap">
          <table class="rank-table">
            <thead><tr><th>流出</th><th>分组</th><th>涨跌</th><th>主力净额</th><th>占比</th></tr></thead>
            <tbody id="outflowRows"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="watch-section">
      <div class="section-head">
        <h2>观察池信号</h2>
        <span id="watchHint" class="hint">筛选后 - 个</span>
      </div>
      <div id="watchSignals" class="grid"></div>
    </section>

    <section id="market-section">
      <div class="section-head">
        <h2>市场/板块资金流</h2>
        <span id="marketHint" class="hint">完整明细</span>
      </div>
      <div id="marketFlow" class="grid"></div>
    </section>

    <section id="backtest-section">
      <div class="section-head">
        <h2>信号回测</h2>
        <span id="backtestHint" class="hint">验证策略有效性</span>
      </div>
      <div id="backtestPanel" class="empty">等待回测数据</div>
    </section>

    <section id="journal-section">
      <div class="section-head">
        <h2>交易日志</h2>
        <span id="journalHint" class="hint">记录每一笔决策</span>
      </div>
      <div id="journalStats" class="journal-stats"></div>
      <div class="journal-actions">
        <button id="openJournalAdd" type="button">+ 新交易</button>
        <button id="clearJournal" type="button" style="color:var(--red)">清空</button>
      </div>
      <div id="journalAddPanel" class="journal-panel">
        <div class="form-grid" style="display:grid;gap:8px">
          <input id="jCode" list="instrumentOptions" placeholder="代码或名称，如 510300 / 沪深300ETF">
          <input id="jName" list="instrumentNameOptions" placeholder="名称，如 沪深300ETF">
          <input id="jEntryDate" placeholder="开仓日期，如 2026-07-01" type="date">
          <input id="jEntryPrice" placeholder="开仓价" type="number" step="0.001">
          <input id="jShares" placeholder="股数" type="number" step="1">
          <input id="jReason" placeholder="开仓理由（引用信号）">
        </div>
        <div class="form-actions" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
          <button id="closeJournalAdd" type="button">取消</button>
          <button id="saveJournalAdd" class="primary" type="button">记录</button>
        </div>
      </div>
      <div id="journalList" class="grid"></div>
    </section>
    <section id="gaps-section">
      <div class="section-head">
        <h2>数据缺口</h2>
        <span class="hint">不假装完整</span>
      </div>
      <div id="gaps" class="empty">暂无数据</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="页面导航">
    <a href="#focus-section" class="active">关注</a>
    <a href="#etf-section">ETF</a>
    <a href="#rank-section">排名</a>
    <a href="#watch-section">观察</a>
    <a href="#market-section">资金</a>
    <a href="#backtest-section">回测</a>
    <a href="#journal-section">交易</a>
    <a href="#gaps-section">缺口</a>
  </nav>
  <datalist id="instrumentOptions"></datalist>
  <datalist id="instrumentNameOptions"></datalist>

  <script>
    const state = { data: null, etf: null, etfSession: "latest", showAll: true, filters: new Set(), candidates: [] };
    const fmt = (v, d = 2) => v === null || v === undefined || Number.isNaN(Number(v)) ? "暂无" : Number(v).toFixed(d);
    const pct = (v, d = 1) => v === null || v === undefined || Number.isNaN(Number(v)) ? "暂无" : `${Number(v).toFixed(d)}%`;
    const money = v => {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "暂无";
      const abs = Math.abs(Number(v));
      if (abs >= 100000000) return `${(Number(v) / 100000000).toFixed(2)}亿`;
      if (abs >= 10000) return `${(Number(v) / 10000).toFixed(0)}万`;
      return Number(v).toFixed(0);
    };
    const cls = v => Number(v) > 0 ? "pos" : Number(v) < 0 ? "neg" : "flat";
    const safe = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    const statusClass = status => status === "Focus watch" ? "" : status === "Exclude for now" ? "exclude" : "wait";
    const decisionLabel = status => ({
      "Focus watch": "可观察",
      "Wait for strength": "待观察",
      "Exclude for now": "待排除"
    }[status] || status || "资金观察");
    const dataStatusLabel = status => ({
      live: "实时",
      stale: "延迟",
      unavailable: "不可用",
      unknown: "未知"
    }[status] || "未知");
    const priorityLabel = priority => ({
      core: "核心",
      high: "高优先",
      normal: "普通",
      low: "低优先"
    }[priority] || "普通");
    const regimeLabel = regime => ({
      TREND_UP: "趋势向上",
      RANGE: "震荡",
      TREND_DOWN: "趋势向下"
    }[regime] || regime || "暂无");
    const statusFilters = ["Focus watch", "Wait for strength", "Exclude for now"];
    const statusFilterLabels = {
      "Focus watch": "可观察",
      "Wait for strength": "待观察",
      "Exclude for now": "待排除"
    };
    const decisionStatusMap = {
      focus: "Focus watch",
      wait: "Wait for strength",
      exclude: "Exclude for now"
    };
    const etfSectionFilter = "ETF训练仓";
    const sectionFilters = {
      [etfSectionFilter]: "etf"
    };
    const groupFilterLabels = ["宽基"];
    const mainBroadEtfCodes = new Set(["510050", "510300", "510500", "512100", "159915", "588000", "588220"]);

    async function loadEtfReport(session) {
      if (session === "latest") {
        try {
          state.etf = await DashboardApi.fetchLatest("etf-pool", "etf_pool_latest.json");
        } catch (error) {
          state.etf = null;
        }
        return;
      }
      // Try to load specific session report from reports/{trade_date}/{session}.json
      try {
        const tradeDate = state.etf?.trade_date || new Date().toISOString().slice(0, 10);
        const base = await DashboardApi.apiBase();
        const candidates = [];
        if (base) candidates.push(`${base}/api/report/short-flow/${tradeDate}/${session}`);
        candidates.push(`reports/${tradeDate}/${session}.json`);
        for (const url of candidates) {
          try {
            const res = await fetch(url, { cache: "no-store" });
            if (res.ok) { state.etf = await res.json(); return; }
          } catch { /* try next */ }
        }
      } catch { /* keep current etf data */ }
    }

    async function loadData() {
      state.data = await DashboardApi.fetchLatest("short-flow", "dashboard_latest.json");
      await loadEtfReport(state.etfSession);
      await loadCandidateList();
      render();
    }

    function allRows() {
      return [...(state.data?.market_flow || []), ...(state.data?.watch_signals || [])];
    }

    async function loadCandidateList() {
      const rows = [];
      try {
        const res = await fetch("watchlist_v1.json", { cache: "no-store" });
        if (res.ok) {
          const data = await res.json();
          rows.push(...(data.items || []));
        }
      } catch { /* local candidate list is optional */ }
      rows.push(...allRows());
      for (const bucket of ["focus_watch", "wait", "exclude", "exit_queue"]) {
        rows.push(...(state.etf?.[bucket] || []));
      }
      try {
        const res = await fetch("../instrument_universe.json", { cache: "no-store" });
        if (res.ok) {
          const data = await res.json();
          rows.push(...(data.items || []));
        }
      } catch { /* maintained universe is optional */ }
      const seen = new Set();
      state.candidates = rows
        .map(row => ({
          code: String(row.code || "").trim(),
          name: String(row.display_name || row.name || "").trim(),
          group: String(row.group || row.category || row.bucket || "").trim(),
          market: String(row.market || "").trim(),
          assetType: String(row.asset_type || "").trim()
        }))
        .filter(row => {
          const key = `${row.market || "LOCAL"}:${row.code}`;
          return row.code && !seen.has(key) && seen.add(key);
        })
        .sort((a, b) => {
          const rankA = a.market === "A" ? 0 : a.market === "US" ? 1 : 2;
          const rankB = b.market === "A" ? 0 : b.market === "US" ? 1 : 2;
          return rankA - rankB || a.code.localeCompare(b.code);
        });
      renderCandidateOptions();
    }

    function renderCandidateOptions() {
      const codeOptions = state.candidates.map(row =>
        `<option value="${safe(row.code)}" label="${safe([row.name, row.group, row.market].filter(Boolean).join(" · "))}"></option>`
      ).join("");
      const nameOptions = state.candidates.map(row =>
        `<option value="${safe(row.name || row.code)}" label="${safe([row.code, row.group, row.market].filter(Boolean).join(" · "))}"></option>`
      ).join("");
      document.getElementById("instrumentOptions").innerHTML = codeOptions;
      document.getElementById("instrumentNameOptions").innerHTML = nameOptions;
    }

    function candidateByInput(value) {
      const query = String(value || "").trim().toLowerCase();
      if (!query) return null;
      return state.candidates.find(row =>
        row.code.toLowerCase() === query || row.name.toLowerCase() === query
      ) || null;
    }

    function textMatches(row) {
      const query = document.getElementById("search").value.trim().toLowerCase();
      if (!query) return true;
      const text = `${row.code} ${row.display_name || row.name} ${row.name} ${row.group} ${decisionLabel(row.status)} ${row.category} ${row.reason}`.toLowerCase();
      return text.includes(query);
    }

    function selectedStatuses() {
      return statusFilters.filter(status => state.filters.has(status));
    }

    function selectedSections() {
      return [...state.filters].map(filter => sectionFilters[filter]).filter(Boolean);
    }

    function selectedGroups() {
      return [...state.filters].filter(filter => !statusFilters.includes(filter) && !sectionFilters[filter]);
    }

    function sectionMatches(section) {
      if (state.showAll) return true;
      const sections = selectedSections();
      if (sections.length) return sections.includes(section);
      if (!state.filters.size) return false;
      return true;
    }

    function statusMatches(row) {
      const statuses = selectedStatuses();
      if (!statuses.length) return true;
      return statuses.some(status => {
        if (status === "Focus watch") return row.status === status || row._decision === "focus";
        if (status === "Wait for strength") return row.status === status || row._decision === "wait";
        if (status === "Exclude for now") return row.status === status || row._decision === "exclude";
        return false;
      });
    }

    function groupMatches(row) {
      const groups = selectedGroups();
      if (!groups.length) return true;
      return groups.some(group => {
        if (group === "宽基") {
          return mainBroadEtfCodes.has(String(row.code || "").trim());
        }
        return row.group === group || row.category === group || row.bucket === group;
      });
    }

    function filterMatches(row, section = "main") {
      if (!state.filters.size) return sectionMatches(section);
      return sectionMatches(section) && statusMatches(row) && groupMatches(row);
    }

    function filtered(rows, section = "main") {
      return rows.filter(row => {
        return filterMatches(row, section) && textMatches(row);
      });
    }

    function setSectionVisible(id, visible) {
      const section = document.getElementById(id);
      if (section) section.style.display = visible ? "" : "none";
      const navLink = document.querySelector(`.bottom-nav a[href="#${id}"]`);
      if (navLink) navLink.style.display = visible ? "" : "none";
    }

    function updateSectionVisibility() {
      const showEtf = sectionMatches("etf");
      const showMain = sectionMatches("main");
      const selectedSectionKeys = selectedSections();
      setSectionVisible("filter-empty", !state.showAll && !state.filters.size);
      setSectionVisible("focus-section", state.showAll || !!state.filters.size);
      setSectionVisible("etf-section", showEtf);
      setSectionVisible("rank-section", showMain);
      setSectionVisible("watch-section", showMain);
      setSectionVisible("market-section", showMain);
      setSectionVisible("backtest-section", state.showAll || selectedSectionKeys.includes("etf"));
      setSectionVisible("journal-section", state.showAll);
      setSectionVisible("gaps-section", state.showAll);
    }

    function renderSummary() {
      const counts = state.data?.status_counts || {};
      document.getElementById("marketCount").textContent = state.data?.market_flow?.length ?? 0;
      document.getElementById("focusCount").textContent = counts["Focus watch"] ?? 0;
      document.getElementById("waitCount").textContent = (counts["Wait for strength"] ?? 0) + (counts["Exclude for now"] ?? 0);
      const source = state.data?.source_status || {};
      document.getElementById("meta").textContent = `生成时间：${state.data?.asof || "暂无"} · 交易日：${state.data?.trade_date || "暂无"} · 接口 实时/延迟/不可用：${source.live_rows || 0}/${source.stale_rows || 0}/${source.unavailable_rows || 0} · 不自动交易`;
    }

    function renderChips() {
      const modes = ["all", ...statusFilters, etfSectionFilter, ...groupFilterLabels];
      const labels = { all: "全部", ...statusFilterLabels, [etfSectionFilter]: "ETF训练仓" };
      const chips = document.getElementById("chips");
      chips.innerHTML = modes.map(mode =>
        `<button type="button" class="chip ${(mode === "all" ? state.showAll : state.filters.has(mode)) ? "active" : ""}" data-filter="${safe(mode)}">${safe(labels[mode] || mode)}</button>`
      ).join("");
    }

    function card(row) {
      return `
        <article class="card">
          <div class="top">
            <div>
              <div class="name">${safe(row.display_name || row.name || row.code)}</div>
              <div class="code">${safe(row.code)} · ${safe(row.group)} · ${safe(decisionLabel(row.status))} · ${safe(dataStatusLabel(row.data_status))}</div>
            </div>
            <div>
              <div class="price">${fmt(row.close)}</div>
              <div style="text-align:right;margin-top:5px"><span class="pill">${safe(priorityLabel(row.priority))}</span></div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>涨跌幅</span><b class="${cls(row.pct)}">${pct(row.pct)}</b></div>
            <div class="metric"><span>主力净额</span><b class="${cls(row.main_net)}">${money(row.main_net)}</b></div>
            <div class="metric"><span>主力占比</span><b class="${cls(row.main_net_pct)}">${pct(row.main_net_pct)}</b></div>
            <div class="metric"><span>MA5/MA20</span><b>${fmt(row.ma5)} / ${fmt(row.ma20)}</b></div>
            <div class="metric"><span>5/20日涨幅</span><b>${pct(row.return_5d_pct)} / ${pct(row.return_20d_pct)}</b></div>
            <div class="metric"><span>额/20日均</span><b>${fmt(row.amount_ratio_20, 2)}x</b></div>
          </div>
          <div class="signal ${statusClass(row.status)}">${safe(decisionLabel(row.status))}：${safe(row.reason || "等待数据")}</div>
          ${row.next_trigger ? `<div class="plan"><b>触发：</b>${safe(row.next_trigger)}</div>` : ""}
          ${row.failure ? `<div class="plan"><b>失败：</b>${safe(row.failure)}</div>` : ""}
          ${row.plan_note ? `<div class="reason">${safe(row.plan_note)}</div>` : ""}
        </article>
      `;
    }

    function rankRow(row) {
      return `
        <tr>
          <td><span class="rank-name">${safe(row.display_name || row.name || row.code)}</span><span class="rank-code">${safe(row.code)}</span></td>
          <td>${safe(row.group)}</td>
          <td class="${cls(row.pct)}">${pct(row.pct)}</td>
          <td class="${cls(row.main_net)}">${money(row.main_net)}</td>
          <td class="${cls(row.main_net_pct)}">${pct(row.main_net_pct)}</td>
        </tr>
      `;
    }

    function etfRowsForAttention() {
      const buckets = [
        ["focus_watch", "focus", "ETF训练仓"],
        ["wait", "wait", "ETF训练仓"],
        ["exclude", "exclude", "ETF训练仓"],
        ["exit_queue", "exclude", "退出队列"]
      ];
      return buckets.flatMap(([bucket, decision, source]) =>
        (state.etf?.[bucket] || []).map(row => ({
          ...row,
          _section: "etf",
          _source: source,
          _decision: decision,
          status: decisionStatusMap[decision],
          group: row.group || row.category || row.bucket
        }))
      );
    }

    function attentionRows() {
      const statuses = selectedStatuses();
      const targetStatuses = statuses.length ? statuses : ["Focus watch"];
      const mainRows = [
        ...(state.data?.watch_signals || []).map(row => ({ ...row, _section: "main", _source: "观察池" })),
        ...(state.data?.market_flow || []).map(row => ({ ...row, _section: "main", _source: "市场/板块" }))
      ];
      return [...mainRows, ...etfRowsForAttention()]
        .filter(row => targetStatuses.includes(row.status))
        .filter(row => filterMatches(row, row._section || "main") && textMatches(row))
        .sort((a, b) => {
          const sourceRank = (a._source === "观察池" ? 0 : a._source === "ETF训练仓" ? 1 : 2) -
            (b._source === "观察池" ? 0 : b._source === "ETF训练仓" ? 1 : 2);
          return sourceRank || (b.score ?? 0) - (a.score ?? 0) || (b.main_net_pct ?? 0) - (a.main_net_pct ?? 0);
        });
    }

    function attentionCard(row) {
      const title = row.display_name || row.name || row.code;
      const value = row.score != null ? fmt(row.score, 1) : row.main_net_pct != null ? pct(row.main_net_pct) : "";
      const note = row.reason || row.trigger || row.next_trigger || "等待下一次确认";
      const trigger = row.next_trigger || row.trigger || "";
      const failure = row.failure || "";
      return `
        <article class="card attention-card">
          <div class="attention-head">
            <div>
              <div class="name">${safe(title)}</div>
              <div class="code">${safe(row.code)} · ${safe(row.group || row.category || "-")} · ${safe(decisionLabel(row.status))}</div>
            </div>
            <div>
              <div class="attention-source">${safe(row._source || "看板")}</div>
              ${value ? `<div style="text-align:right;margin-top:5px"><span class="pill">${safe(value)}</span></div>` : ""}
            </div>
          </div>
          <div class="signal ${statusClass(row.status)}">${safe(note)}</div>
          ${trigger ? `<div class="plan"><b>触发：</b>${safe(trigger)}</div>` : ""}
          ${failure ? `<div class="reason"><b>失败：</b>${safe(failure)}</div>` : ""}
        </article>
      `;
    }

    function renderAttention() {
      const rows = attentionRows();
      const statuses = selectedStatuses();
      const title = statuses.length ? `${statuses.map(status => statusFilterLabels[status]).join(" / ")}清单` : "今日关注";
      document.getElementById("focusTitle").textContent = title;
      document.getElementById("focusHint").textContent = rows.length > 6 ? `筛选后 ${rows.length} 个，显示前 6 个` : rows.length ? `筛选后 ${rows.length} 个` : "暂无匹配";
      document.getElementById("focusPanel").innerHTML = rows.length
        ? rows.slice(0, 6).map(attentionCard).join("")
        : '<div class="empty">当前筛选下没有需要优先关注的标的。可以点“待观察”看候选，或点“全部”复核全量。</div>';
    }

    function renderRanks() {
      const ranked = filtered(allRows(), "main");
      const inflow = [...ranked].sort((a, b) => (b.main_net ?? -1e30) - (a.main_net ?? -1e30)).slice(0, 6);
      const outflow = [...ranked].sort((a, b) => (a.main_net ?? 1e30) - (b.main_net ?? 1e30)).slice(0, 6);
      document.getElementById("inflowRows").innerHTML = inflow.length ? inflow.map(rankRow).join("") : '<tr><td colspan="5">没有匹配的流入排名</td></tr>';
      document.getElementById("outflowRows").innerHTML = outflow.length ? outflow.map(rankRow).join("") : '<tr><td colspan="5">没有匹配的流出排名</td></tr>';
    }

    function renderSections() {
      const marketRows = filtered(state.data?.market_flow || [], "main");
      const watchRows = filtered(state.data?.watch_signals || [], "main");
      document.getElementById("marketHint").textContent = `筛选后 ${marketRows.length} 个`;
      document.getElementById("watchHint").textContent = `筛选后 ${watchRows.length} 个`;
      document.getElementById("marketFlow").innerHTML = marketRows.length ? marketRows.map(card).join("") : '<div class="empty">没有匹配的市场/板块标的</div>';
      document.getElementById("watchSignals").innerHTML = watchRows.length ? watchRows.map(card).join("") : '<div class="empty">没有匹配的观察标的</div>';
    }


    function decisionCard(title, rows, decision) {
      if (!decisionVisible(decision)) return "";
      const visibleRows = filtered((rows || []).map(row => ({
        ...row,
        _decision: decision,
        status: decisionStatusMap[decision],
        group: row.group || row.category || row.bucket
      })), "etf");
      const decisionClass = decision === "focus" ? "focus" : decision === "exclude" ? "exclude" : "wait";
      const displayRows = decision === "exclude" ? visibleRows.slice(0, 8) : visibleRows;
      const hiddenCount = visibleRows.length - displayRows.length;
      return `
        <div class="card decision-card ${decisionClass}">
          <div class="decision-head">
            <div class="decision-title">${safe(title)}</div>
            <div class="decision-count">${visibleRows.length} 个</div>
          </div>
          <div class="decision-list">
            ${displayRows.length ? displayRows.map(row => `
              <div class="decision-row ${decision === "exclude" ? "compact" : ""}">
                <div class="decision-main">
                  <b>${safe(row.code)} ${safe(row.name)}</b>
                  <span class="score-pill">${row.score != null ? fmt(row.score, 1) : "暂无"}</span>
                </div>
                <div class="decision-note">${safe(row.reason || "-")}</div>
                ${decision === "exclude" ? "" : `<div class="decision-meta">
                  <span><b>触发</b> ${safe(row.trigger || "-")}</span>
                  <span><b>失败</b> ${safe(row.failure || "-")}</span>
                </div>`}
              </div>
            `).join("") : '<div class="decision-note">无</div>'}
            ${hiddenCount > 0 ? `<div class="decision-more">还有 ${hiddenCount} 个低优先级排除项已收起</div>` : ""}
          </div>
        </div>
      `;
    }

    function decisionVisible(decision) {
      if (!sectionMatches("etf")) return false;
      const statuses = selectedStatuses();
      return !statuses.length || statuses.includes(decisionStatusMap[decision]);
    }

    function renderBacktest() {
      const panel = document.getElementById("backtestPanel");
      const hint = document.getElementById("backtestHint");
      const bt = state.etf?.backtest;
      if (!bt || !bt.total_signals) {
        hint.textContent = bt ? "暂无回测数据" : "等待回测数据";
        panel.className = "empty";
        panel.innerHTML = "回测数据将在每日收盘后自动生成。<br>当积累足够信号后，这里会展示历史可观察信号的实际命中率。";
        return;
      }
      hint.textContent = `共 ${bt.total_signals} 个历史信号`;
      panel.className = "";

      function statRow(label, wr, avgRet) {
        const wrText = wr != null ? `${(wr * 100).toFixed(0)}%` : "暂无";
        const retText = avgRet != null ? `${avgRet >= 0 ? "+" : ""}${avgRet.toFixed(2)}%` : "暂无";
        const retCls = avgRet > 0 ? "pos" : avgRet < 0 ? "neg" : "flat";
        return `<div class="etf-mini"><span>${label}</span><b>${wrText} <span class="${retCls}" style="font-size:13px">${retText}</span></b></div>`;
      }

      const overall = bt.overall;
      let html = `
        <div class="etf-overview">
          <div class="etf-strip">
            ${statRow("总信号数", null, null).replace("<b>", "<b>").replace("暂无", String(bt.total_signals)).replace(/<span[^>]*>.*?<\/span>/, "")}
            ${statRow("1日胜率/均收益", overall?.win_rate_1d, overall?.avg_return_1d)}
            ${statRow("5日胜率/均收益", overall?.win_rate_5d, overall?.avg_return_5d)}
            ${statRow("10日胜率/均收益", overall?.win_rate_10d, overall?.avg_return_10d)}
          </div>`;

      // Per-regime breakdown
      const regimes = bt.by_regime || {};
      if (Object.keys(regimes).length) {
        html += `<div style="margin-top:12px"><div class="section-head"><h3 style="font-size:15px">按市场状态</h3></div></div>`;
        for (const [reg, stats] of Object.entries(regimes)) {
          if (!stats) continue;
          html += `
            <div class="etf-strip" style="margin-bottom:6px">
              <div class="etf-mini"><span>${safe(regimeLabel(reg))}</span><b>${stats.count}个</b></div>
              ${statRow("5日胜率", stats.win_rate_5d, stats.avg_return_5d)}
              ${statRow("10日胜率", stats.win_rate_10d, stats.avg_return_10d)}
              <div class="etf-mini"><span>均分</span><b>${stats.avg_score != null ? stats.avg_score.toFixed(0) : "暂无"}</b></div>
            </div>`;
        }
      }

      // Recent signals
      const recent = bt.recent || [];
      if (recent.length) {
        html += `<div style="margin-top:12px"><div class="section-head"><h3 style="font-size:15px">最近信号</h3></div>`;
        html += `<div class="table-wrap"><table><thead><tr>
          <th>日期</th><th>代码</th><th>名称</th><th>状态</th><th>1日</th><th>5日</th>
        </tr></thead><tbody>`;
        for (const r of recent.slice(0, 15)) {
          const hit1 = r.hit_1d === 1 ? "✅" : r.hit_1d === 0 ? "❌" : "-";
          const hit5 = r.hit_5d === 1 ? "✅" : r.hit_5d === 0 ? "❌" : "-";
          html += `<tr>
            <td>${safe(r.signal_date)}</td>
            <td>${safe(r.code)}</td>
            <td>${safe(r.name)}</td>
            <td>${safe(regimeLabel(r.regime))}</td>
            <td class="${r.return_1d > 0 ? 'pos' : r.return_1d < 0 ? 'neg' : 'flat'}">${hit1} ${r.return_1d != null ? (r.return_1d >= 0 ? '+' : '') + r.return_1d.toFixed(2) + '%' : '暂无'}</td>
            <td class="${r.return_5d > 0 ? 'pos' : r.return_5d < 0 ? 'neg' : 'flat'}">${hit5} ${r.return_5d != null ? (r.return_5d >= 0 ? '+' : '') + r.return_5d.toFixed(2) + '%' : '暂无'}</td>
          </tr>`;
        }
        html += `</tbody></table></div></div>`;
      }
      html += `</div>`;
      panel.innerHTML = html;
    }
    function renderEtfPool() {
      const root = document.getElementById("etfPool");
      const hint = document.getElementById("etfHint");
      const data = state.etf;
      if (!data) {
        hint.textContent = "等待最新训练仓数据";
        root.className = "empty";
        root.innerHTML = "还没有导出 ETF 训练仓结果";
        return;
      }
      const regime = data.market_regime || {};
      const permission = data.trading_permission || {};
      const guardrails = data.guardrails || {};
      hint.textContent = `${data.session_name || data.session || "最新"} · ${data.trade_date || "暂无"}`;
      root.className = "";
      root.innerHTML = `
        <div class="etf-overview">
          <div class="etf-status-grid">
            <div class="status-card primary"><span>市场状态</span><b>${safe(regimeLabel(regime.regime))}</b></div>
            <div class="status-card ${permission.can_open ? "ok" : "warn"}"><span>训练仓</span><b>${permission.can_open ? "允许开仓" : "停止新开"}</b></div>
            <div class="status-card"><span>最大敞口</span><b>${pct((permission.max_exposure_pct || 0) * 100, 0)}</b></div>
            <div class="status-card"><span>分析编号 / 时间</span><b>#${safe(data.analysis_run_id || "暂无")} · ${safe(data.generated_at || "暂无")}</b></div>
          </div>
          <div class="guardrail-strip" aria-label="训练仓配置">
            <span class="guardrail">本金 <b>${money(guardrails.train_capital)}</b></span>
            <span class="guardrail">首笔 <b>${pct((guardrails.first_entry_ratio || 0) * 100, 0)}</b></span>
            <span class="guardrail">单ETF <b>${pct((guardrails.max_single_etf_pct || 0) * 100, 0)}</b></span>
            <span class="guardrail">主题 <b>${permission.theme_enabled ? "启用" : "关闭"}</b></span>
            <span class="guardrail">趋势向下 <b>${safe(guardrails.trend_down_exit_days || 3)}日退出</b></span>
          </div>
          <div class="decision-grid">
            ${decisionCard("可观察", data.focus_watch || [], "focus")}
            ${decisionCard("待观察", data.wait || [], "wait")}
            ${decisionCard("待排除", data.exclude || [], "exclude")}
          </div>
          ${data.exit_queue?.length ? decisionCard("趋势向下退出队列", data.exit_queue, "exclude") : ""}
        </div>
      `;
      if (!root.querySelector(".decision-card")) {
        const grid = root.querySelector(".decision-grid");
        if (grid) grid.innerHTML = '<div class="empty">没有匹配的训练仓标的</div>';
      }
    }
    function renderGaps() {
      const gaps = state.data?.data_gaps || [];
      const box = document.getElementById("gaps");
      box.className = gaps.length ? "gap-box" : "empty";
      box.innerHTML = gaps.length ? gaps.map(gap => `<div>- ${safe(gap)}</div>`).join("") : "暂无数据缺口";
    }

    function render() {
      renderSummary();
      renderChips();
      updateSectionVisibility();
      renderAttention();
      renderRanks();
      renderSections();
      renderEtfPool();
      renderBacktest();
      renderJournal();
      renderGaps();
    }

    function renderFilteredViews() {
      renderChips();
      updateSectionVisibility();
      renderAttention();
      renderRanks();
      renderSections();
      renderEtfPool();
      renderBacktest();
      renderJournal();
    }

    function showError(error) {
      document.getElementById("meta").textContent = "没有读到最新数据文件";
      document.getElementById("marketFlow").innerHTML = '<div class="empty">先运行刷新脚本生成最新数据，再用本地服务器打开本页面。</div>';
      document.getElementById("watchSignals").innerHTML = `<div class="empty">${safe(error.message)}</div>`;
    }

    document.getElementById("search").addEventListener("input", renderFilteredViews);
    document.getElementById("reload").addEventListener("click", () => loadData().catch(showError));
    document.getElementById("etfSession").addEventListener("change", async (event) => {
      state.etfSession = event.target.value;
      await loadEtfReport(state.etfSession);
      await loadCandidateList();
      renderEtfPool();
      renderBacktest();
    });
    document.getElementById("chips").addEventListener("click", event => {
      const button = event.target.closest("button[data-filter]");
      if (!button) return;
      const filter = button.dataset.filter || "all";
      if (filter === "all") {
        state.filters.clear();
        state.showAll = true;
      } else if (state.filters.has(filter)) {
        state.showAll = false;
        state.filters.delete(filter);
      } else {
        state.showAll = false;
        state.filters.add(filter);
      }
      renderFilteredViews();
    });
    // --- Trade Journal ---
    const JOURNAL_KEY = "short_flow_trade_journal_v1";

    function loadJournal() {
      try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || "[]"); } catch { return []; }
    }

    function saveJournal(entries) {
      localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries));
    }

    function journalStats() {
      const entries = loadJournal();
      const closed = entries.filter(e => e.exit_price != null);
      const open = entries.filter(e => e.exit_price == null);
      const wins = closed.filter(e => (e.pnl || 0) > 0);
      const totalPnl = closed.reduce((sum, e) => sum + (e.pnl || 0), 0);
      return {
        total: entries.length,
        open: open.length,
        closed: closed.length,
        wins: wins.length,
        winRate: closed.length ? (wins.length / closed.length * 100).toFixed(0) + "%" : "暂无",
        totalPnl: totalPnl,
        avgReturn: closed.length ? (closed.reduce((s, e) => s + (e.pnl_pct || 0), 0) / closed.length).toFixed(2) + "%" : "暂无",
      };
    }

    function renderJournal() {
      const entries = loadJournal();
      const stats = journalStats();
      document.getElementById("journalHint").textContent = `${stats.total} 笔 · ${stats.open} 持仓中`;

      document.getElementById("journalStats").innerHTML = `
        <div class="summary-card"><b>${stats.total}</b><span>总记录</span></div>
        <div class="summary-card"><b>${stats.open}</b><span>持仓中</span></div>
        <div class="summary-card"><b>${stats.winRate}</b><span>胜率(${stats.wins}/${stats.closed})</span></div>
        <div class="summary-card"><b class="${stats.totalPnl > 0 ? 'pos' : stats.totalPnl < 0 ? 'neg' : 'flat'}">${stats.totalPnl >= 0 ? '+' : ''}${stats.totalPnl.toFixed(0)}</b><span>总盈亏 · 均${stats.avgReturn}</span></div>
      `;

      // Sort: open first, then by entry_date desc
      const sorted = [...entries].sort((a, b) => {
        if (!a.exit_price && b.exit_price) return -1;
        if (a.exit_price && !b.exit_price) return 1;
        return (b.entry_date || "").localeCompare(a.entry_date || "");
      });

      document.getElementById("journalList").innerHTML = sorted.length
        ? sorted.map((e, i) => {
            const isOpen = e.exit_price == null;
            const pnl = e.pnl != null ? e.pnl : (e.exit_price && e.entry_price ? (e.exit_price - e.entry_price) * (e.shares || 100) : null);
            const pnlPct = e.pnl_pct != null ? e.pnl_pct : (e.exit_price && e.entry_price ? ((e.exit_price / e.entry_price - 1) * 100) : null);
            const pnlCls = (pnl || 0) > 0 ? "pos" : (pnl || 0) < 0 ? "neg" : "flat";
            return `
            <article class="card">
              <div class="top">
                <div>
                  <div class="name">${safe(e.code)} ${safe(e.name || "")}</div>
                  <div class="code">开仓：${safe(e.entry_date || "暂无")} @ ${fmt(e.entry_price, 3)} · ${safe(e.shares || 100)}股 ${isOpen ? '· <span style="color:var(--blue)">持仓中</span>' : `· 平仓：${safe(e.exit_date || "暂无")} @ ${fmt(e.exit_price, 3)}`}</div>
                </div>
                <div style="text-align:right">
                  <div class="price ${pnlCls}">${pnl != null ? (pnl >= 0 ? '+' : '') + pnl.toFixed(0) : "暂无"}</div>
                  <div style="font-size:12px;color:var(--muted)">${pnlPct != null ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : ''}</div>
                </div>
              </div>
              <div class="reason">${safe(e.reason || "无备注")}</div>
              ${isOpen ? `<button data-idx="${i}" class="closeTradeBtn" style="margin-top:8px;width:100%">平仓</button>` : ""}
              <button data-idx="${i}" class="delTradeBtn" style="margin-top:4px;width:100%;font-size:12px;color:var(--muted)">删除</button>
            </article>`;
          }).join("")
        : '<div class="empty">暂无交易记录。<br>每笔模拟交易帮助你验证策略有效性。</div>';

      // Attach event listeners
      document.querySelectorAll(".closeTradeBtn").forEach(btn => {
        btn.addEventListener("click", () => closeTrade(parseInt(btn.dataset.idx)));
      });
      document.querySelectorAll(".delTradeBtn").forEach(btn => {
        btn.addEventListener("click", () => deleteTrade(parseInt(btn.dataset.idx)));
      });
    }

    function closeTrade(idx) {
      const entries = loadJournal();
      const e = entries[idx];
      const exitPrice = prompt(`平仓 ${e.code} ${e.name}\n开仓价：${e.entry_price}\n输入平仓价：`, "");
      if (!exitPrice) return;
      const price = parseFloat(exitPrice);
      if (isNaN(price)) return;
      const exitDate = prompt("平仓日期（YYYY-MM-DD）：", new Date().toISOString().slice(0, 10));
      if (!exitDate) return;
      const exitReason = prompt("平仓理由：", "") || "";
      e.exit_price = price;
      e.exit_date = exitDate;
      e.exit_reason = exitReason;
      e.shares = e.shares || 100;
      e.pnl = (price - e.entry_price) * e.shares;
      e.pnl_pct = (price / e.entry_price - 1) * 100;
      entries[idx] = e;
      saveJournal(entries);
      renderJournal();
    }

    function deleteTrade(idx) {
      if (!confirm("删除这笔交易记录？")) return;
      const entries = loadJournal();
      entries.splice(idx, 1);
      saveJournal(entries);
      renderJournal();
    }

    // Journal form handlers
    document.getElementById("openJournalAdd").addEventListener("click", () => {
      document.getElementById("journalAddPanel").style.display = "block";
      document.getElementById("jCode").focus();
    });
    function applyJournalCandidate(value) {
      const candidate = candidateByInput(value);
      if (!candidate) return;
      document.getElementById("jCode").value = candidate.code;
      document.getElementById("jName").value = candidate.name || candidate.code;
    }
    for (const eventName of ["input", "change"]) {
      document.getElementById("jCode").addEventListener(eventName, event => applyJournalCandidate(event.target.value));
      document.getElementById("jName").addEventListener(eventName, event => applyJournalCandidate(event.target.value));
    }
    document.getElementById("closeJournalAdd").addEventListener("click", () => {
      document.getElementById("journalAddPanel").style.display = "none";
    });
    document.getElementById("saveJournalAdd").addEventListener("click", () => {
      const entry = {
        code: (candidateByInput(document.getElementById("jCode").value)?.code || document.getElementById("jCode").value).trim(),
        name: (document.getElementById("jName").value.trim() || candidateByInput(document.getElementById("jCode").value)?.name || ""),
        entry_date: document.getElementById("jEntryDate").value || new Date().toISOString().slice(0, 10),
        entry_price: parseFloat(document.getElementById("jEntryPrice").value) || 0,
        shares: parseInt(document.getElementById("jShares").value) || 100,
        reason: document.getElementById("jReason").value.trim() || "手动记录",
        exit_price: null,
        exit_date: null,
        exit_reason: null,
        pnl: null,
        pnl_pct: null,
      };
      if (!entry.code) return;
      const entries = loadJournal();
      entries.push(entry);
      saveJournal(entries);
      // Clear form
      document.querySelectorAll("#jCode,#jName,#jEntryPrice,#jShares,#jReason").forEach(el => el.value = "");
      document.getElementById("journalAddPanel").style.display = "none";
      renderJournal();
    });
    document.getElementById("clearJournal").addEventListener("click", () => {
      if (confirm("确认清空所有交易记录？此操作不可恢复。")) {
        saveJournal([]);
        renderJournal();
      }
    });

    // --- End Trade Journal ---

    const sections = ["etf-section", "focus-section", "rank-section", "watch-section", "market-section", "backtest-section", "journal-section", "gaps-section"];
    window.addEventListener("scroll", () => {
      const visibleSections = sections.filter(id => {
        const section = document.getElementById(id);
        return section && getComputedStyle(section).display !== "none";
      });
      const current = visibleSections.findLast(id => document.getElementById(id).getBoundingClientRect().top < 220) || visibleSections[0] || sections[0];
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
      });
    }, { passive: true });

    loadData().catch(showError);
  </script>
</body>
</html>
