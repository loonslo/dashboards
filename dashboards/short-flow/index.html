<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>short-flow A股短线资金跟随看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #66717d;
      --line: #dde3ea;
      --soft: #eef2f5;
      --blue: #1769e0;
      --green: #157a3c;
      --red: #bd2b2b;
      --amber: #8a6200;
      --shadow: 0 8px 24px rgba(25, 35, 45, 0.07);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.96);
      backdrop-filter: blur(14px);
    }
    .wrap {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 14px;
    }
    .hero {
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }
    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .summary-card {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .summary-card b {
      display: block;
      font-size: 18px;
      line-height: 1.15;
    }
    .summary-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    input, button {
      min-width: 0;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
    }
    input { padding: 0 12px; }
    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 650;
    }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: #34404a;
      font-size: 13px;
      font-weight: 650;
    }
    .chip.active {
      border-color: #b8cff8;
      background: #eaf2ff;
      color: #174ea6;
    }
    main.wrap { padding-bottom: 82px; }
    section {
      scroll-margin-top: 178px;
      margin: 16px 0 22px;
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    .rank-grid {
      display: grid;
      gap: 10px;
    }
    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .name {
      min-width: 0;
      font-size: 16px;
      font-weight: 760;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .code {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .price {
      text-align: right;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .metric {
      min-width: 0;
      padding: 8px;
      border-radius: 8px;
      background: var(--soft);
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .metric b {
      display: block;
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .signal {
      margin-top: 10px;
      padding: 8px 9px;
      border-radius: 8px;
      background: #eef5ff;
      color: #174ea6;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .signal.wait {
      background: #fff7e6;
      color: var(--amber);
    }
    .signal.exclude {
      background: #fdeeee;
      color: var(--red);
    }
    .reason, .plan {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 132px;
      min-height: 25px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f1f3f4;
      color: #3c4043;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .flat { color: var(--muted); }
    .primary {
      border-color: #b8cff8;
      background: #eaf2ff;
      color: #174ea6;
    }
    .empty, .gap-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .gap-box {
      border-color: #efd58a;
      background: #fff8e1;
      color: #5f4300;
    }
    .etf-overview {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    .etf-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .etf-mini {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .etf-mini span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .etf-mini b {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .decision-grid {
      display: grid;
      gap: 10px;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fafbfc;
    }
    tr:last-child td { border-bottom: 0; }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(14px);
    }
    .bottom-nav a {
      font-size: 11px;
      display: grid;
      place-items: center;
      min-height: 42px;
      border-radius: 8px;
      color: #34404a;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }
    .bottom-nav a.active {
      background: #eaf2ff;
      color: #174ea6;
    }
    @media (min-width: 820px) {
      .wrap { padding-left: 20px; padding-right: 20px; }
      .hero { grid-template-columns: minmax(0, 1fr) 360px; align-items: start; }
      .summary { grid-column: 2; grid-row: 1 / span 2; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rank-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .etf-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .decision-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .bottom-nav { display: none; }
      main.wrap { padding-bottom: 28px; }
    }
    @media (min-width: 1180px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 370px) {
      h1 { font-size: 20px; }
      .summary, .metrics { grid-template-columns: 1fr; }
      .price { font-size: 18px; }
    }
  </style>
  <script src="../api-client.js"></script>
</head>
<body>
  <header>
    <div class="wrap hero">
      <div>
        <h1>short-flow A股短线资金跟随看板</h1>
        <div id="meta" class="meta">等待数据</div>
      </div>
      <div class="summary" aria-label="摘要">
        <div class="summary-card"><b id="marketCount">-</b><span>市场/板块</span></div>
        <div class="summary-card"><b id="focusCount">-</b><span>Focus watch</span></div>
        <div class="summary-card"><b id="waitCount">-</b><span>Wait/Exclude</span></div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜代码、名称、分组、状态">
        <button id="reload" type="button">刷新</button>
      </div>
      <nav id="chips" class="chips" aria-label="快速筛选"></nav>
    </div>
  </header>

  <main class="wrap">
    <section id="rank-section">
      <div class="section-head">
        <h2>资金流排名</h2>
        <span class="hint">先看钱去哪里</span>
      </div>
      <div class="rank-grid">
        <div class="table-wrap">
          <table>
            <thead><tr><th>流入</th><th>分组</th><th>涨跌</th><th>主力净额</th><th>占比</th></tr></thead>
            <tbody id="inflowRows"></tbody>
          </table>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>流出</th><th>分组</th><th>涨跌</th><th>主力净额</th><th>占比</th></tr></thead>
            <tbody id="outflowRows"></tbody>
          </table>
        </div>
      </div>
    </section>


    <section id="etf-section">
      <div class="section-head">
        <h2>ETF训练仓</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="etfSession" style="height:34px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);font-size:13px;padding:0 8px">
            <option value="latest">最新 (etf_pool_latest.json)</option>
            <option value="0850">08:50 盘前</option>
            <option value="0940">09:40 盘中确认</option>
            <option value="1130">11:30 午间</option>
            <option value="1430">14:30 尾盘</option>
            <option value="1520">15:20 盘后</option>
          </select>
          <span id="etfHint" class="hint">等待数据</span>
        </div>
      </div>
      <div id="etfPool" class="empty">等待数据</div>
    </section>
    <section id="backtest-section">
      <div class="section-head">
        <h2>信号回测</h2>
        <span id="backtestHint" class="hint">验证策略有效性</span>
      </div>
      <div id="backtestPanel" class="empty">等待回测数据</div>
    </section>
    <section id="market-section">
      <div class="section-head">
        <h2>市场/板块资金流</h2>
        <span id="marketHint" class="hint">筛选后 - 个</span>
      </div>
      <div id="marketFlow" class="grid"></div>
    </section>

    <section id="watch-section">
      <div class="section-head">
        <h2>观察池信号</h2>
        <span id="watchHint" class="hint">筛选后 - 个</span>
      </div>
      <div id="watchSignals" class="grid"></div>
    </section>

    <section id="journal-section">
      <div class="section-head">
        <h2>交易日志</h2>
        <span id="journalHint" class="hint">记录每一笔决策</span>
      </div>
      <div id="journalStats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px"></div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px">
        <button id="openJournalAdd" type="button">+ 新交易</button>
        <button id="clearJournal" type="button" style="color:var(--red)">清空</button>
      </div>
      <div id="journalAddPanel" style="display:none;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);margin-bottom:10px">
        <div class="form-grid" style="display:grid;gap:8px">
          <input id="jCode" placeholder="代码，如 510300">
          <input id="jName" placeholder="名称，如 沪深300ETF">
          <input id="jEntryDate" placeholder="开仓日期，如 2026-07-01" type="date">
          <input id="jEntryPrice" placeholder="开仓价" type="number" step="0.001">
          <input id="jShares" placeholder="股数" type="number" step="1">
          <input id="jReason" placeholder="开仓理由（引用信号）">
        </div>
        <div class="form-actions" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
          <button id="closeJournalAdd" type="button">取消</button>
          <button id="saveJournalAdd" class="primary" type="button">记录</button>
        </div>
      </div>
      <div id="journalList" class="grid"></div>
    </section>
    <section id="gaps-section">
      <div class="section-head">
        <h2>数据缺口</h2>
        <span class="hint">不假装完整</span>
      </div>
      <div id="gaps" class="empty">暂无数据</div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="页面导航">
    <a href="#rank-section" class="active">排名</a>
    <a href="#etf-section">ETF</a>
    <a href="#backtest-section">回测</a>
    <a href="#market-section">资金</a>
    <a href="#watch-section">观察</a>
    <a href="#journal-section">交易</a>
    <a href="#gaps-section">缺口</a>
  </nav>

  <script>
    const state = { data: null, etf: null, etfSession: "latest", mode: "all" };
    const fmt = (v, d = 2) => v === null || v === undefined || Number.isNaN(Number(v)) ? "N/A" : Number(v).toFixed(d);
    const pct = (v, d = 1) => v === null || v === undefined || Number.isNaN(Number(v)) ? "N/A" : `${Number(v).toFixed(d)}%`;
    const money = v => {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "N/A";
      const abs = Math.abs(Number(v));
      if (abs >= 100000000) return `${(Number(v) / 100000000).toFixed(2)}亿`;
      if (abs >= 10000) return `${(Number(v) / 10000).toFixed(0)}万`;
      return Number(v).toFixed(0);
    };
    const cls = v => Number(v) > 0 ? "pos" : Number(v) < 0 ? "neg" : "flat";
    const safe = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    const statusClass = status => status === "Focus watch" ? "" : status === "Exclude for now" ? "exclude" : "wait";

    async function loadEtfReport(session) {
      if (session === "latest") {
        try {
          state.etf = await DashboardApi.fetchLatest("etf-pool", "etf_pool_latest.json");
        } catch (error) {
          state.etf = null;
        }
        return;
      }
      // Try to load specific session report from reports/{trade_date}/{session}.json
      try {
        const tradeDate = state.etf?.trade_date || new Date().toISOString().slice(0, 10);
        const base = await DashboardApi.apiBase();
        const candidates = [];
        if (base) candidates.push(`${base}/api/report/short-flow/${tradeDate}/${session}`);
        candidates.push(`reports/${tradeDate}/${session}.json`);
        for (const url of candidates) {
          try {
            const res = await fetch(url, { cache: "no-store" });
            if (res.ok) { state.etf = await res.json(); return; }
          } catch { /* try next */ }
        }
      } catch { /* keep current etf data */ }
    }

    async function loadData() {
      state.data = await DashboardApi.fetchLatest("short-flow", "dashboard_latest.json");
      await loadEtfReport(state.etfSession);
      render();
    }

    function allRows() {
      return [...(state.data?.market_flow || []), ...(state.data?.watch_signals || [])];
    }

    function textMatches(row) {
      const query = document.getElementById("search").value.trim().toLowerCase();
      if (!query) return true;
      const text = `${row.code} ${row.display_name || row.name} ${row.name} ${row.group} ${row.status} ${row.category} ${row.reason}`.toLowerCase();
      return text.includes(query);
    }

    function modeMatches(row) {
      const mode = state.mode;
      if (mode === "all") return true;
      if (mode === "Focus watch") return row.status === mode || row._decision === "focus";
      if (mode === "Wait for strength") return row.status === mode || row._decision === "wait";
      if (mode === "Exclude for now") return row.status === mode || row._decision === "exclude";
      return row.group === mode || row.category === mode;
    }

    function filtered(rows) {
      return rows.filter(row => {
        return modeMatches(row) && textMatches(row);
      });
    }

    function renderSummary() {
      const counts = state.data?.status_counts || {};
      document.getElementById("marketCount").textContent = state.data?.market_flow?.length ?? 0;
      document.getElementById("focusCount").textContent = counts["Focus watch"] ?? 0;
      document.getElementById("waitCount").textContent = (counts["Wait for strength"] ?? 0) + (counts["Exclude for now"] ?? 0);
      const source = state.data?.source_status || {};
      document.getElementById("meta").textContent = `生成时间：${state.data?.asof || "N/A"} · 交易日：${state.data?.trade_date || "N/A"} · 接口 live/stale/N/A：${source.live_rows || 0}/${source.stale_rows || 0}/${source.unavailable_rows || 0} · 不自动交易`;
    }

    function renderChips() {
      const groups = [...new Set(allRows().map(row => row.group).filter(Boolean))].sort();
      const modes = ["all", "Focus watch", "Wait for strength", "Exclude for now", ...groups];
      const labels = { all: "全部", "Focus watch": "Focus", "Wait for strength": "Wait", "Exclude for now": "Exclude" };
      const chips = document.getElementById("chips");
      chips.innerHTML = modes.map(mode =>
        `<button type="button" class="chip ${state.mode === mode ? "active" : ""}" data-mode="${safe(mode)}">${safe(labels[mode] || mode)}</button>`
      ).join("");
    }

    function card(row) {
      return `
        <article class="card">
          <div class="top">
            <div>
              <div class="name">${safe(row.display_name || row.name || row.code)}</div>
              <div class="code">${safe(row.code)} · ${safe(row.group)} · ${safe(row.status || "资金观察")} · ${safe(row.data_status || "unknown")}</div>
            </div>
            <div>
              <div class="price">${fmt(row.close)}</div>
              <div style="text-align:right;margin-top:5px"><span class="pill">${safe(row.priority || "normal")}</span></div>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>涨跌幅</span><b class="${cls(row.pct)}">${pct(row.pct)}</b></div>
            <div class="metric"><span>主力净额</span><b class="${cls(row.main_net)}">${money(row.main_net)}</b></div>
            <div class="metric"><span>主力占比</span><b class="${cls(row.main_net_pct)}">${pct(row.main_net_pct)}</b></div>
            <div class="metric"><span>MA5/MA20</span><b>${fmt(row.ma5)} / ${fmt(row.ma20)}</b></div>
            <div class="metric"><span>5/20日涨幅</span><b>${pct(row.return_5d_pct)} / ${pct(row.return_20d_pct)}</b></div>
            <div class="metric"><span>额/20日均</span><b>${fmt(row.amount_ratio_20, 2)}x</b></div>
          </div>
          <div class="signal ${statusClass(row.status)}">${safe(row.status || "资金观察")}：${safe(row.reason || "等待数据")}</div>
          ${row.next_trigger ? `<div class="plan"><b>触发：</b>${safe(row.next_trigger)}</div>` : ""}
          ${row.failure ? `<div class="plan"><b>失败：</b>${safe(row.failure)}</div>` : ""}
          ${row.plan_note ? `<div class="reason">${safe(row.plan_note)}</div>` : ""}
        </article>
      `;
    }

    function rankRow(row) {
      return `
        <tr>
          <td>${safe(row.display_name || row.name || row.code)} <span class="code">${safe(row.code)}</span></td>
          <td>${safe(row.group)}</td>
          <td class="${cls(row.pct)}">${pct(row.pct)}</td>
          <td class="${cls(row.main_net)}">${money(row.main_net)}</td>
          <td class="${cls(row.main_net_pct)}">${pct(row.main_net_pct)}</td>
        </tr>
      `;
    }

    function renderRanks() {
      const ranked = filtered(allRows());
      const inflow = [...ranked].sort((a, b) => (b.main_net ?? -1e30) - (a.main_net ?? -1e30)).slice(0, 8);
      const outflow = [...ranked].sort((a, b) => (a.main_net ?? 1e30) - (b.main_net ?? 1e30)).slice(0, 8);
      document.getElementById("inflowRows").innerHTML = inflow.length ? inflow.map(rankRow).join("") : '<tr><td colspan="5">没有匹配的流入排名</td></tr>';
      document.getElementById("outflowRows").innerHTML = outflow.length ? outflow.map(rankRow).join("") : '<tr><td colspan="5">没有匹配的流出排名</td></tr>';
    }

    function renderSections() {
      const marketRows = filtered(state.data?.market_flow || []);
      const watchRows = filtered(state.data?.watch_signals || []);
      document.getElementById("marketHint").textContent = `筛选后 ${marketRows.length} 个`;
      document.getElementById("watchHint").textContent = `筛选后 ${watchRows.length} 个`;
      document.getElementById("marketFlow").innerHTML = marketRows.length ? marketRows.map(card).join("") : '<div class="empty">没有匹配的市场/板块标的</div>';
      document.getElementById("watchSignals").innerHTML = watchRows.length ? watchRows.map(card).join("") : '<div class="empty">没有匹配的观察标的</div>';
    }


    function decisionCard(title, rows, decision) {
      const visibleRows = filtered((rows || []).map(row => ({ ...row, _decision: decision })));
      return `
        <div class="card">
          <div class="name">${safe(title)}</div>
          ${visibleRows.length ? visibleRows.map(row => `
            <div class="reason">
              <b>${safe(row.code)} ${safe(row.name)}</b><br>
              原因：${safe(row.reason || "-")}<br>
              触发：${safe(row.trigger || "-")}<br>
              失败：${safe(row.failure || "-")}
            </div>
          `).join("") : '<div class="reason">无</div>'}
        </div>
      `;
    }

    function renderBacktest() {
      const panel = document.getElementById("backtestPanel");
      const hint = document.getElementById("backtestHint");
      const bt = state.etf?.backtest;
      if (!bt || !bt.total_signals) {
        hint.textContent = bt ? "暂无回测数据" : "等待回测数据";
        panel.className = "empty";
        panel.innerHTML = "回测数据将在每日收盘后自动生成。<br>当积累足够信号后，这里会展示历史 Focus watch 信号的实际命中率。";
        return;
      }
      hint.textContent = `共 ${bt.total_signals} 个历史信号`;
      panel.className = "";

      function statRow(label, wr, avgRet) {
        const wrText = wr != null ? `${(wr * 100).toFixed(0)}%` : "N/A";
        const retText = avgRet != null ? `${avgRet >= 0 ? "+" : ""}${avgRet.toFixed(2)}%` : "N/A";
        const retCls = avgRet > 0 ? "pos" : avgRet < 0 ? "neg" : "flat";
        return `<div class="etf-mini"><span>${label}</span><b>${wrText} <span class="${retCls}" style="font-size:13px">${retText}</span></b></div>`;
      }

      const overall = bt.overall;
      let html = `
        <div class="etf-overview">
          <div class="etf-strip">
            ${statRow("总信号数", null, null).replace("<b>", "<b>").replace("N/A", String(bt.total_signals)).replace(/<span[^>]*>.*?<\/span>/, "")}
            ${statRow("1日胜率/均收益", overall?.win_rate_1d, overall?.avg_return_1d)}
            ${statRow("5日胜率/均收益", overall?.win_rate_5d, overall?.avg_return_5d)}
            ${statRow("10日胜率/均收益", overall?.win_rate_10d, overall?.avg_return_10d)}
          </div>`;

      // Per-regime breakdown
      const regimes = bt.by_regime || {};
      if (Object.keys(regimes).length) {
        html += `<div style="margin-top:12px"><div class="section-head"><h3 style="font-size:15px">按市场状态</h3></div></div>`;
        for (const [reg, stats] of Object.entries(regimes)) {
          if (!stats) continue;
          html += `
            <div class="etf-strip" style="margin-bottom:6px">
              <div class="etf-mini"><span>${safe(reg)}</span><b>${stats.count}个</b></div>
              ${statRow("5日胜率", stats.win_rate_5d, stats.avg_return_5d)}
              ${statRow("10日胜率", stats.win_rate_10d, stats.avg_return_10d)}
              <div class="etf-mini"><span>均分</span><b>${stats.avg_score != null ? stats.avg_score.toFixed(0) : "N/A"}</b></div>
            </div>`;
        }
      }

      // Recent signals
      const recent = bt.recent || [];
      if (recent.length) {
        html += `<div style="margin-top:12px"><div class="section-head"><h3 style="font-size:15px">最近信号</h3></div>`;
        html += `<div class="table-wrap"><table><thead><tr>
          <th>日期</th><th>代码</th><th>名称</th><th>状态</th><th>1日</th><th>5日</th>
        </tr></thead><tbody>`;
        for (const r of recent.slice(0, 15)) {
          const hit1 = r.hit_1d === 1 ? "✅" : r.hit_1d === 0 ? "❌" : "-";
          const hit5 = r.hit_5d === 1 ? "✅" : r.hit_5d === 0 ? "❌" : "-";
          html += `<tr>
            <td>${safe(r.signal_date)}</td>
            <td>${safe(r.code)}</td>
            <td>${safe(r.name)}</td>
            <td>${safe(r.regime)}</td>
            <td class="${r.return_1d > 0 ? 'pos' : r.return_1d < 0 ? 'neg' : 'flat'}">${hit1} ${r.return_1d != null ? (r.return_1d >= 0 ? '+' : '') + r.return_1d.toFixed(2) + '%' : 'N/A'}</td>
            <td class="${r.return_5d > 0 ? 'pos' : r.return_5d < 0 ? 'neg' : 'flat'}">${hit5} ${r.return_5d != null ? (r.return_5d >= 0 ? '+' : '') + r.return_5d.toFixed(2) + '%' : 'N/A'}</td>
          </tr>`;
        }
        html += `</tbody></table></div></div>`;
      }
      html += `</div>`;
      panel.innerHTML = html;
    }
    function renderEtfPool() {
      const root = document.getElementById("etfPool");
      const hint = document.getElementById("etfHint");
      const data = state.etf;
      if (!data) {
        hint.textContent = "等待 etf_pool_latest.json";
        root.className = "empty";
        root.innerHTML = "还没有导出 ETF 训练仓结果";
        return;
      }
      const regime = data.market_regime || {};
      const permission = data.trading_permission || {};
      const guardrails = data.guardrails || {};
      hint.textContent = `${data.session_name || data.session || "最新"} · ${data.trade_date || "N/A"}`;
      root.className = "";
      root.innerHTML = `
        <div class="etf-overview">
          <div class="etf-strip">
            <div class="etf-mini"><span>市场状态</span><b>${safe(regime.regime || "N/A")}</b></div>
            <div class="etf-mini"><span>能否开仓</span><b>${permission.can_open ? "允许训练仓" : "停止新开仓"}</b></div>
            <div class="etf-mini"><span>最大敞口</span><b>${pct((permission.max_exposure_pct || 0) * 100, 0)}</b></div>
            <div class="etf-mini"><span>主题ETF</span><b>${permission.theme_enabled ? "启用" : "关闭"}</b></div>
            <div class="etf-mini"><span>训练本金</span><b>${money(guardrails.train_capital)}</b></div>
            <div class="etf-mini"><span>首笔比例</span><b>${pct((guardrails.first_entry_ratio || 0) * 100, 0)}</b></div>
            <div class="etf-mini"><span>单ETF上限</span><b>${pct((guardrails.max_single_etf_pct || 0) * 100, 0)}</b></div>
            <div class="etf-mini"><span>TREND_DOWN</span><b>${safe(guardrails.trend_down_exit_days || 3)}日退出</b></div>
            <div class="etf-mini"><span>分析ID</span><b>#${safe(data.analysis_run_id || "N/A")}</b></div>
            <div class="etf-mini"><span>生成时间</span><b>${safe(data.generated_at || "N/A")}</b></div>
          </div>
          <div class="decision-grid">
            ${decisionCard("可观察", data.focus_watch || [], "focus")}
            ${decisionCard("等待", data.wait || [], "wait")}
            ${decisionCard("今日不碰", data.exclude || [], "exclude")}
          </div>
          ${data.exit_queue?.length ? decisionCard("TREND_DOWN退出队列", data.exit_queue, "exclude") : ""}
        </div>
      `;
    }
    function renderGaps() {
      const gaps = state.data?.data_gaps || [];
      const box = document.getElementById("gaps");
      box.className = gaps.length ? "gap-box" : "empty";
      box.innerHTML = gaps.length ? gaps.map(gap => `<div>- ${safe(gap)}</div>`).join("") : "暂无数据缺口";
    }

    function render() {
      renderSummary();
      renderChips();
      renderRanks();
      renderSections();
      renderEtfPool();
      renderBacktest();
      renderJournal();
      renderGaps();
    }

    function renderFilteredViews() {
      renderChips();
      renderRanks();
      renderSections();
      renderEtfPool();
      renderBacktest();
      renderJournal();
    }

    function showError(error) {
      document.getElementById("meta").textContent = "没有读到 dashboard_latest.json";
      document.getElementById("marketFlow").innerHTML = '<div class="empty">先运行脚本生成 dashboard_latest.json，再用本地服务器打开本页面。</div>';
      document.getElementById("watchSignals").innerHTML = `<div class="empty">${safe(error.message)}</div>`;
    }

    document.getElementById("search").addEventListener("input", renderFilteredViews);
    document.getElementById("reload").addEventListener("click", () => loadData().catch(showError));
    document.getElementById("etfSession").addEventListener("change", async (event) => {
      state.etfSession = event.target.value;
      await loadEtfReport(state.etfSession);
      renderEtfPool();
      renderBacktest();
    });
    document.getElementById("chips").addEventListener("click", event => {
      const button = event.target.closest("button[data-mode]");
      if (!button) return;
      state.mode = button.dataset.mode || "all";
      renderFilteredViews();
    });

    // --- Trade Journal ---
    const JOURNAL_KEY = "short_flow_trade_journal_v1";

    function loadJournal() {
      try { return JSON.parse(localStorage.getItem(JOURNAL_KEY) || "[]"); } catch { return []; }
    }

    function saveJournal(entries) {
      localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries));
    }

    function journalStats() {
      const entries = loadJournal();
      const closed = entries.filter(e => e.exit_price != null);
      const open = entries.filter(e => e.exit_price == null);
      const wins = closed.filter(e => (e.pnl || 0) > 0);
      const totalPnl = closed.reduce((sum, e) => sum + (e.pnl || 0), 0);
      return {
        total: entries.length,
        open: open.length,
        closed: closed.length,
        wins: wins.length,
        winRate: closed.length ? (wins.length / closed.length * 100).toFixed(0) + "%" : "N/A",
        totalPnl: totalPnl,
        avgReturn: closed.length ? (closed.reduce((s, e) => s + (e.pnl_pct || 0), 0) / closed.length).toFixed(2) + "%" : "N/A",
      };
    }

    function renderJournal() {
      const entries = loadJournal();
      const stats = journalStats();
      document.getElementById("journalHint").textContent = `${stats.total} 笔 · ${stats.open} 持仓中`;

      document.getElementById("journalStats").innerHTML = `
        <div class="summary-card"><b>${stats.total}</b><span>总记录</span></div>
        <div class="summary-card"><b>${stats.open}</b><span>持仓中</span></div>
        <div class="summary-card"><b>${stats.winRate}</b><span>胜率(${stats.wins}/${stats.closed})</span></div>
        <div class="summary-card"><b class="${stats.totalPnl > 0 ? 'pos' : stats.totalPnl < 0 ? 'neg' : 'flat'}">${stats.totalPnl >= 0 ? '+' : ''}${stats.totalPnl.toFixed(0)}</b><span>总盈亏 · 均${stats.avgReturn}</span></div>
      `;

      // Sort: open first, then by entry_date desc
      const sorted = [...entries].sort((a, b) => {
        if (!a.exit_price && b.exit_price) return -1;
        if (a.exit_price && !b.exit_price) return 1;
        return (b.entry_date || "").localeCompare(a.entry_date || "");
      });

      document.getElementById("journalList").innerHTML = sorted.length
        ? sorted.map((e, i) => {
            const isOpen = e.exit_price == null;
            const pnl = e.pnl != null ? e.pnl : (e.exit_price && e.entry_price ? (e.exit_price - e.entry_price) * (e.shares || 100) : null);
            const pnlPct = e.pnl_pct != null ? e.pnl_pct : (e.exit_price && e.entry_price ? ((e.exit_price / e.entry_price - 1) * 100) : null);
            const pnlCls = (pnl || 0) > 0 ? "pos" : (pnl || 0) < 0 ? "neg" : "flat";
            return `
            <article class="card">
              <div class="top">
                <div>
                  <div class="name">${safe(e.code)} ${safe(e.name || "")}</div>
                  <div class="code">开仓：${safe(e.entry_date || "N/A")} @ ${fmt(e.entry_price, 3)} · ${safe(e.shares || 100)}股 ${isOpen ? '· <span style="color:var(--blue)">持仓中</span>' : `· 平仓：${safe(e.exit_date || "N/A")} @ ${fmt(e.exit_price, 3)}`}</div>
                </div>
                <div style="text-align:right">
                  <div class="price ${pnlCls}">${pnl != null ? (pnl >= 0 ? '+' : '') + pnl.toFixed(0) : "N/A"}</div>
                  <div style="font-size:12px;color:var(--muted)">${pnlPct != null ? (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%' : ''}</div>
                </div>
              </div>
              <div class="reason">${safe(e.reason || "无备注")}</div>
              ${isOpen ? `<button data-idx="${i}" class="closeTradeBtn" style="margin-top:8px;width:100%">平仓</button>` : ""}
              <button data-idx="${i}" class="delTradeBtn" style="margin-top:4px;width:100%;font-size:12px;color:var(--muted)">删除</button>
            </article>`;
          }).join("")
        : '<div class="empty">暂无交易记录。<br>每笔模拟交易帮助你验证策略有效性。</div>';

      // Attach event listeners
      document.querySelectorAll(".closeTradeBtn").forEach(btn => {
        btn.addEventListener("click", () => closeTrade(parseInt(btn.dataset.idx)));
      });
      document.querySelectorAll(".delTradeBtn").forEach(btn => {
        btn.addEventListener("click", () => deleteTrade(parseInt(btn.dataset.idx)));
      });
    }

    function closeTrade(idx) {
      const entries = loadJournal();
      const e = entries[idx];
      const exitPrice = prompt(`平仓 ${e.code} ${e.name}\n开仓价：${e.entry_price}\n输入平仓价：`, "");
      if (!exitPrice) return;
      const price = parseFloat(exitPrice);
      if (isNaN(price)) return;
      const exitDate = prompt("平仓日期（YYYY-MM-DD）：", new Date().toISOString().slice(0, 10));
      if (!exitDate) return;
      const exitReason = prompt("平仓理由：", "") || "";
      e.exit_price = price;
      e.exit_date = exitDate;
      e.exit_reason = exitReason;
      e.shares = e.shares || 100;
      e.pnl = (price - e.entry_price) * e.shares;
      e.pnl_pct = (price / e.entry_price - 1) * 100;
      entries[idx] = e;
      saveJournal(entries);
      renderJournal();
    }

    function deleteTrade(idx) {
      if (!confirm("删除这笔交易记录？")) return;
      const entries = loadJournal();
      entries.splice(idx, 1);
      saveJournal(entries);
      renderJournal();
    }

    // Journal form handlers
    document.getElementById("openJournalAdd").addEventListener("click", () => {
      document.getElementById("journalAddPanel").style.display = "block";
      document.getElementById("jCode").focus();
    });
    document.getElementById("closeJournalAdd").addEventListener("click", () => {
      document.getElementById("journalAddPanel").style.display = "none";
    });
    document.getElementById("saveJournalAdd").addEventListener("click", () => {
      const entry = {
        code: document.getElementById("jCode").value.trim(),
        name: document.getElementById("jName").value.trim(),
        entry_date: document.getElementById("jEntryDate").value || new Date().toISOString().slice(0, 10),
        entry_price: parseFloat(document.getElementById("jEntryPrice").value) || 0,
        shares: parseInt(document.getElementById("jShares").value) || 100,
        reason: document.getElementById("jReason").value.trim() || "手动记录",
        exit_price: null,
        exit_date: null,
        exit_reason: null,
        pnl: null,
        pnl_pct: null,
      };
      if (!entry.code) return;
      const entries = loadJournal();
      entries.push(entry);
      saveJournal(entries);
      // Clear form
      document.querySelectorAll("#jCode,#jName,#jEntryPrice,#jShares,#jReason").forEach(el => el.value = "");
      document.getElementById("journalAddPanel").style.display = "none";
      renderJournal();
    });
    document.getElementById("clearJournal").addEventListener("click", () => {
      if (confirm("确认清空所有交易记录？此操作不可恢复。")) {
        saveJournal([]);
        renderJournal();
      }
    });

    // --- End Trade Journal ---

    const sections = ["rank-section", "etf-section", "backtest-section", "market-section", "watch-section", "journal-section", "gaps-section"];
    window.addEventListener("scroll", () => {
      const current = sections.findLast(id => document.getElementById(id).getBoundingClientRect().top < 220) || sections[0];
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
      });
    }, { passive: true });

    loadData().catch(showError);
  </script>
</body>
</html>
